    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.

        let debugVisible = false;
        let debugInfo = {
            timestamps: [],
            apiRequests: [],
            errors: []
        };

        let allResources = {
            practitioners: [],
            organizations: [],
            locations: [],
            healthcareServices: [],
            practitionerRoles: []
        };

        let currentDirectory = null;

        function addDebugLog(category, message, data = null) {
            const timestamp = new Date().toISOString();
            debugInfo.timestamps.push({
                time: timestamp,
                category: category,
                message: message,
                data: data
            });
            updateDebugPanel();
        }

        function toggleDebug() {
            debugVisible = !debugVisible;
            document.getElementById('debugPanel').classList.toggle('collapsed');
        }

        function updateDebugPanel() {
            const content = document.getElementById('debugContent');
            let html = '';

            // API Requests Section
            if (debugInfo.apiRequests.length > 0) {
                html += '<div class="debug-section"><h3>🌐 API Requests</h3>';
                debugInfo.apiRequests.forEach((req, idx) => {
                    const status = req.ok ? '✓ OK' : `✗ ${req.status}`;
                    const statusColor = req.ok ? '#4caf50' : '#f44336';
                    html += `
                        <div class="debug-line">
                            <span class="debug-label">#${idx + 1}:</span>
                            <span class="debug-value">${req.url}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Status:</span>
                            <span class="debug-value" style="color: ${statusColor};">${status}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Duration:</span>
                            <span class="debug-value">${req.duration}ms</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Timeline
            if (debugInfo.timestamps.length > 0) {
                html += '<div class="debug-section"><h3>⏱️ Timeline</h3>';
                debugInfo.timestamps.forEach(log => {
                    html += `
                        <div class="debug-line">
                            <span class="debug-label">${new Date(log.time).toLocaleTimeString()}:</span>
                            <span class="debug-value">[${log.category}] ${log.message}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            if (debugInfo.errors.length > 0) {
                html += '<div class="debug-section error-section"><h3>❌ Errors</h3>';
                debugInfo.errors.forEach(error => {
                    html += `
                        <div class="debug-line">
                            <span class="debug-label">Error:</span>
                            <span class="debug-value" style="color: #f44336;">${error.message}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            content.innerHTML = html || '<p style="color: #999;">No debug logs yet...</p>';
        }

        function filterResources() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const contentDiv = document.getElementById('content');

            if (!searchTerm) {
                // Show all results
                displayAllResults();
                return;
            }

            // Filter and display
            let filteredCount = 0;
            const sections = document.querySelectorAll('.section');

            sections.forEach(section => {
                const items = section.querySelectorAll('.resource-item');
                let visibleCount = 0;

                items.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    if (text.includes(searchTerm)) {
                        item.style.display = 'block';
                        visibleCount++;
                        filteredCount++;
                    } else {
                        item.style.display = 'none';
                    }
                });

                section.style.display = visibleCount > 0 ? 'block' : 'none';
            });

            // Show message if no results
            if (filteredCount === 0) {
                contentDiv.innerHTML = `<div class="no-data">📭 No providers found matching "${searchTerm}"</div>`;
            }
        }

        function displayAllResults() {
            const contentDiv = document.getElementById('content');
            let html = '';

            // Practitioners
            if (allResources.practitioners.length > 0) {
                html += '<div class="section"><h2>👨‍⚕️ Practitioners (' + allResources.practitioners.length + ')</h2>';
                allResources.practitioners.forEach(p => {
                    const name = p.name?.[0]?.text ||
                        ((p.name?.[0]?.given?.join(' ') || '') + ' ' + (p.name?.[0]?.family || '')).trim() ||
                        'Unknown';
                    const specialties = p.qualification?.map(q =>
                        q.code?.coding?.[0]?.display || q.code?.text || ''
                    ).filter(s => s).join(', ');
                    const escapedName = name.replace(/'/g, "\\");

                    html += `
                        <div class="resource-item clickable" onclick="showPractitionerDetails('${p.id}', '${escapedName}')"
                             title="Click to view roles and details">
                            <strong>${name}</strong><br>
                            ${specialties ? `<small>Specialties: ${specialties}</small><br>` : ''}
                            <small style="color: #999;">ID: ${p.id}</small>
                            <small style="color: #0076ce; margin-top: 8px; display: block;">📋 Click for details &amp; roles →</small>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Organizations
            if (allResources.organizations.length > 0) {
                html += '<div class="section"><h2>🏢 Organizations (' + allResources.organizations.length + ')</h2>';
                allResources.organizations.forEach(o => {
                    const name = o.name || 'Unknown Organization';
                    const type = o.type?.[0]?.text || o.type?.[0]?.coding?.[0]?.display || '';

                    html += `
                        <div class="resource-item">
                            <strong>${name}</strong><br>
                            ${type ? `Type: ${type}<br>` : ''}
                            <small style="color: #999;">ID: ${o.id}</small>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Locations
            if (allResources.locations.length > 0) {
                html += '<div class="section"><h2>📍 Locations (' + allResources.locations.length + ')</h2>';
                allResources.locations.forEach(l => {
                    const name = l.name || 'Unknown Location';
                    const address = l.address?.text || 'No address available';

                    html += `
                        <div class="resource-item">
                            <strong>${name}</strong><br>
                            <small>${address}</small><br>
                            <small style="color: #999;">ID: ${l.id}</small>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Healthcare Services
            if (allResources.healthcareServices.length > 0) {
                html += '<div class="section"><h2>💊 Healthcare Services (' + allResources.healthcareServices.length + ')</h2>';
                allResources.healthcareServices.forEach(hs => {
                    const name = hs.name || 'Unknown Service';
                    const specialty = hs.specialty?.map(s =>
                        s.coding?.[0]?.display || s.text || ''
                    ).filter(s => s).join(', ');

                    html += `
                        <div class="resource-item">
                            <strong>${name}</strong><br>
                            ${specialty ? `Specialty: ${specialty}<br>` : ''}
                            <small style="color: #999;">ID: ${hs.id}</small>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Practitioner Roles
            if (allResources.practitionerRoles.length > 0) {
                html += '<div class="section"><h2>👔 Practitioner Roles (' + allResources.practitionerRoles.length + ')</h2>';
                allResources.practitionerRoles.forEach(pr => {
                    const role = pr.code?.map(c => c.coding?.[0]?.display || c.text || '').filter(r => r).join(', ');
                    const specialty = pr.specialty?.map(s =>
                        s.coding?.[0]?.display || s.text || ''
                    ).filter(s => s).join(', ');

                    html += `
                        <div class="resource-item">
                            ${role ? `<strong>${role}</strong><br>` : ''}
                            ${specialty ? `Specialty: ${specialty}<br>` : ''}
                            <small style="color: #999;">ID: ${pr.id}</small>
                        </div>
                    `;
                });
                html += '</div>';
            }

            if (!html) {
                html = '<div class="no-data">📭 No provider data available</div>';
            }

            contentDiv.innerHTML = html;
        }

        function displayStats() {
            const stats = {
                practitioners: allResources.practitioners.length,
                organizations: allResources.organizations.length,
                locations: allResources.locations.length,
                services: allResources.healthcareServices.length,
                roles: allResources.practitionerRoles.length
            };

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.practitioners}</div>
                    <div class="stat-label">Practitioners</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.organizations}</div>
                    <div class="stat-label">Organizations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.locations}</div>
                    <div class="stat-label">Locations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.services}</div>
                    <div class="stat-label">Services</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.roles}</div>
                    <div class="stat-label">Roles</div>
                </div>
            `;
        }

        async function fetchResourceBundle(resourceType, baseUrl) {
            const url = `${baseUrl}/${resourceType}?_count=100`;

            const startTime = performance.now();
            addDebugLog('API', `Fetching ${resourceType}...`, { url });

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/fhir+json',
                    },
                    referrerPolicy: 'no-referrer'
                });

                const duration = Math.round(performance.now() - startTime);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const resources = data.entry?.map(e => e.resource).filter(r => r) || [];

                debugInfo.apiRequests.push({
                    url: url,
                    ok: true,
                    status: response.status,
                    duration: duration,
                    resourceType: resourceType,
                    count: resources.length
                });

                addDebugLog('API', `✓ Fetched ${resources.length} ${resourceType}`, { status: response.status });

                return resources;

            } catch (error) {
                const duration = Math.round(performance.now() - startTime);
                debugInfo.apiRequests.push({
                    url: url,
                    ok: false,
                    status: 'Error',
                    duration: duration,
                    error: error.message
                });

                addDebugLog('ERROR', `Failed to fetch ${resourceType}: ${error.message}`);
                debugInfo.errors.push({
                    time: new Date().toISOString(),
                    message: `${resourceType}: ${error.message}`
                });

                return [];
            }
        }

        function showPractitionerDetails(practitionerId, practitionerName) {
            const modal = document.getElementById('practitionerModal');
            modal.classList.add('show');
            document.getElementById('modalTitle').textContent = `👨‍⚕️ ${practitionerName}`;
            loadPractitionerDetails(practitionerId, practitionerName);
        }

        function closePractitionerModal() {
            const modal = document.getElementById('practitionerModal');
            modal.classList.remove('show');
        }

        async function loadPractitionerDetails(practitionerId, practitionerName) {
            const modalBody = document.getElementById('modalBody');
            
            try {
                // Find and display the practitioner from our cache
                const practitioner = allResources.practitioners.find(p => p.id === practitionerId);
                let html = '';

                if (practitioner) {
                    html += '<div class="modal-section">';
                    html += '<h3>📋 Practitioner Information</h3>';
                    
                    const name = practitioner.name?.[0]?.text ||
                        ((practitioner.name?.[0]?.given?.join(' ') || '') + ' ' + (practitioner.name?.[0]?.family || '')).trim() ||
                        'Unknown';
                    const gender = practitioner.gender || 'Not specified';
                    const birthDate = practitioner.birthDate || 'Not available';
                    const phone = practitioner.telecom?.find(t => t.system === 'phone')?.value;
                    const email = practitioner.telecom?.find(t => t.system === 'email')?.value;

                    html += `<div class="modal-item">`;
                    html += `<strong>Name:</strong> ${name}<br>`;
                    html += `<strong>Gender:</strong> ${gender}<br>`;
                    html += `<strong>Birth Date:</strong> ${birthDate}<br>`;
                    if (phone) html += `<strong>Phone:</strong> ${phone}<br>`;
                    if (email) html += `<strong>Email:</strong> ${email}<br>`;
                    html += `<strong>ID:</strong> ${practitioner.id}<br>`;
                    html += `</div>`;

                    if (practitioner.qualification && practitioner.qualification.length > 0) {
                        html += `<div class="modal-item"><strong>Qualifications:</strong><br>`;
                        practitioner.qualification.forEach(q => {
                            const code = q.code?.coding?.[0]?.display || q.code?.text || 'Unknown';
                            const issuer = q.issuer?.display || q.issuer?.reference || '';
                            html += `• ${code}${issuer ? ` (${issuer})` : ''}<br>`;
                        });
                        html += `</div>`;
                    }

                    html += '</div>';
                }

                // Find related PractitionerRoles
                const relatedRoles = allResources.practitionerRoles.filter(pr => 
                    pr.practitioner?.reference?.includes(practitionerId) ||
                    pr.practitioner?.display?.includes(practitionerName)
                );

                if (relatedRoles.length > 0) {
                    html += '<div class="modal-section">';
                    html += `<h3>👔 Practitioner Roles (${relatedRoles.length})</h3>`;
                    
                    relatedRoles.forEach(role => {
                        html += '<div class="modal-item">';
                        
                        const roleCode = role.code?.map(c => c.coding?.[0]?.display || c.text || '').filter(r => r).join(', ');
                        if (roleCode) html += `<strong>Role:</strong> ${roleCode}<br>`;

                        const specialty = role.specialty?.map(s =>
                            s.coding?.[0]?.display || s.text || ''
                        ).filter(s => s).join(', ');
                        if (specialty) html += `<strong>Specialty:</strong> ${specialty}<br>`;

                        // Get related Organization
                        if (role.organization?.reference) {
                            const orgId = role.organization.reference.split('/').pop();
                            const organization = allResources.organizations.find(o => o.id === orgId);
                            if (organization) {
                                html += `<strong>Organization:</strong> ${organization.name}<br>`;
                            }
                        }

                        // Get related Location
                        if (role.location && role.location.length > 0) {
                            html += `<strong>Location(s):</strong><br>`;
                            role.location.forEach(loc => {
                                const locId = loc.reference?.split('/').pop();
                                const location = allResources.locations.find(l => l.id === locId);
                                if (location) {
                                    html += `• ${location.name}${location.address?.text ? ' - ' + location.address.text : ''}<br>`;
                                }
                            });
                        }

                        // Get related Healthcare Service
                        if (role.healthcareService && role.healthcareService.length > 0) {
                            html += `<strong>Healthcare Service(s):</strong><br>`;
                            role.healthcareService.forEach(hs => {
                                const hsId = hs.reference?.split('/').pop();
                                const service = allResources.healthcareServices.find(s => s.id === hsId);
                                if (service) {
                                    html += `• ${service.name}<br>`;
                                }
                            });
                        }

                        html += `<strong style="display: block; margin-top: 8px; color: #999; font-size: 12px;">Role ID: ${role.id}</strong>`;
                        html += '</div>';
                    });
                    html += '</div>';
                } else {
                    html += '<div class="modal-section"><h3>👔 Practitioner Roles</h3><p style="color: #999;">No roles found for this practitioner</p></div>';
                }

                modalBody.innerHTML = html;
                addDebugLog('DETAIL', `Loaded details for practitioner: ${practitionerName}`, { id: practitionerId, rolesFound: relatedRoles.length });

            } catch (error) {
                addDebugLog('ERROR', `Failed to load practitioner details: ${error.message}`);
                modalBody.innerHTML = `<div class="modal-section"><p style="color: red;">Error loading details: ${error.message}</p></div>`;
            }
        }

        // Close modal when clicking outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('practitionerModal');
            if (event.target === modal) {
                closePractitionerModal();
            }
        }

        async function loadProviderDirectory() {
            addDebugLog('INIT', 'Starting provider directory load...');

            const urlParams = new URLSearchParams(window.location.search);
            const directoryKey = urlParams.get('directory') || ACTIVE_DIRECTORY;
            const directory = PROVIDER_DIRECTORIES[directoryKey];
            currentDirectory = directory;

            if (!directory) {
                document.getElementById('content').innerHTML =
                    '<div class="error"><strong>Error:</strong> Invalid directory selected. <a href="index.html">Go back and select a directory.</a></div>';
                return;
            }

            document.getElementById('headerSubtitle').textContent = `Browsing: ${directory.name} (click on any practitioner to see their roles and details)`;
            addDebugLog('DIR', `Loading directory: ${directory.name}`, { baseUrl: directory.baseUrl });

            try {
                // Fetch all supported resource types
                const resourceTypes = ['Practitioner', 'Organization', 'Location', 'HealthcareService', 'PractitionerRole'];

                for (const resourceType of resourceTypes) {
                    if (!directory.supportedResources || directory.supportedResources.includes(resourceType)) {
                        const resources = await fetchResourceBundle(resourceType, directory.baseUrl);

                        // Store by type
                        switch (resourceType) {
                            case 'Practitioner':
                                allResources.practitioners = resources;
                                break;
                            case 'Organization':
                                allResources.organizations = resources;
                                break;
                            case 'Location':
                                allResources.locations = resources;
                                break;
                            case 'HealthcareService':
                                allResources.healthcareServices = resources;
                                break;
                            case 'PractitionerRole':
                                allResources.practitionerRoles = resources;
                                break;
                        }
                    }
                }

                displayAllResults();
                displayStats();
                addDebugLog('SUCCESS', '✓ All provider directory data loaded successfully');

            } catch (error) {
                addDebugLog('ERROR', `Directory load error: ${error.message}`);
                document.getElementById('content').innerHTML =
                    `<div class="error"><strong>Error Loading Directory:</strong> ${error.message}<br><br>Check the debug panel for more details.</div>`;
            }

            updateDebugPanel();
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Initialize and load
        loadProviderDirectory();
    </script>
</body>

</html>
