<!DOCTYPE html>
<html>
<head>
    <title>SMART App Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0076ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .server-info {
            background: #f0f8ff;
            border-left: 4px solid #0076ce;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            font-size: 13px;
        }
        .detail-line {
            margin: 5px 0;
            font-family: monospace;
            font-size: 12px;
        }
        .label {
            font-weight: bold;
            color: #0076ce;
        }
        .scope-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 3px;
            margin: 2px;
            font-size: 11px;
            font-weight: bold;
        }
        .scope-badge.offline {
            background: #fff3e0;
            color: #f57c00;
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #c62828;
            padding: 20px;
            border-radius: 5px;
            color: #c62828;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 Launching SMART on FHIR App...</h1>
    <div class="spinner"></div>
    <div class="server-info" id="serverInfo"></div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.

        function base64UrlEncode(arrayBuffer) {
            const bytes = new Uint8Array(arrayBuffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        function generateCodeVerifier(length = 64) {
            const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            const random = new Uint8Array(length);
            crypto.getRandomValues(random);

            let verifier = '';
            for (let i = 0; i < random.length; i++) {
                verifier += charset[random[i] % charset.length];
            }
            return verifier;
        }

        async function generatePkcePair() {
            const codeVerifier = generateCodeVerifier();
            const encoded = new TextEncoder().encode(codeVerifier);
            const digest = await crypto.subtle.digest('SHA-256', encoded);
            const codeChallenge = base64UrlEncode(digest);
            return {
                codeVerifier,
                codeChallenge,
                codeChallengeMethod: 'S256'
            };
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const serverParam = urlParams.get('server') || ACTIVE_SERVER;
        const config = FHIR_SERVERS[serverParam];
        
        console.log('=== Launch Configuration ===');
        console.log('Server:', serverParam);
        console.log('Config:', {
            ...config,
            clientSecret: config?.clientSecret ? '***HIDDEN***' : 'not provided'
        });
        
        if (!config) {
            document.body.innerHTML = '<div class="error">Invalid server configuration</div>';
        } else {
            const launchIss = urlParams.get('iss');
            const iss = launchIss || config.iss;
            const launch = urlParams.get('launch');
            const usePkce = !!config.usePkce;
            
            if (!launch && !iss) {
                document.body.innerHTML = '<div class="error">No ISS specified</div>';
            } else {
                startAuthorization();
            }

            async function startAuthorization() {
                // ALWAYS generate state and nonce for OAuth security
                // Use numeric format for Cigna, standard format for others
                let state, nonce;
                let pkce = null;
                
                if (config.useNumericStateNonce) {
                    // Cigna requires simple numeric values
                    state = generateNumericToken(12);
                    nonce = generateNumericToken(12);
                    console.log('✓ Generated numeric state and nonce (Cigna format)');
                } else {
                    // Standard random alphanumeric strings for other servers
                    state = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    nonce = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    console.log('✓ Generated standard state and nonce');
                }
                
                console.log('State:', state);
                console.log('Nonce:', nonce);

                if (usePkce) {
                    pkce = await generatePkcePair();
                    console.log('✓ PKCE enabled for this server');
                    console.log('Code challenge method:', pkce.codeChallengeMethod);
                }
                
                // Parse and display scopes with highlighting
                const scopes = config.scope.split(' ');
                const hasOfflineAccess = scopes.includes('offline_access');
                const scopeBadges = scopes.map(scope => {
                    const isOffline = scope === 'offline_access';
                    return `<span class="scope-badge ${isOffline ? 'offline' : ''}">${scope}</span>`;
                }).join(' ');
                
                console.log('=== Scopes Requested ===');
                scopes.forEach(scope => {
                    if (scope === 'offline_access') {
                        console.log(`  ✓ ${scope} - Will request refresh token`);
                    } else {
                        console.log(`  • ${scope}`);
                    }
                });
                
                // Display launch info
                document.getElementById('serverInfo').innerHTML = `
                    <strong>🏥 ${config.name}</strong><br>
                    <div class="detail-line"><span class="label">ISS:</span> ${iss || 'Dynamic'}</div>
                    <div class="detail-line"><span class="label">Client ID:</span> ${config.clientId}</div>
                    <div class="detail-line"><span class="label">Auth Mode:</span> ${usePkce ? 'PKCE (Public Client)' : 'Client Secret (Confidential Client)'}</div>
                    <div class="detail-line"><span class="label">Client Secret:</span> ${usePkce ? 'Not used in PKCE mode' : (config.clientSecret ? '✓ Configured' : '⚠ Not configured')}</div>
                    <div class="detail-line"><span class="label">State:</span> ${state}</div>
                    <div class="detail-line"><span class="label">Nonce:</span> ${nonce}</div>
                    ${usePkce && pkce ? `<div class="detail-line"><span class="label">PKCE Method:</span> ${pkce.codeChallengeMethod}</div>` : ''}
                    <div class="detail-line"><span class="label">Authorize URL:</span> ${config.authorizeUrl || 'Auto-discovered'}</div>
                    <div class="detail-line"><span class="label">Token URL:</span> ${config.tokenUrl || 'Auto-discovered'}</div>
                    <div class="detail-line" style="margin-top: 10px;">
                        <span class="label">Scopes:</span><br>
                        <div style="margin-top: 5px;">${scopeBadges}</div>
                    </div>
                    ${hasOfflineAccess ? `
                    <div style="margin-top: 10px; padding: 10px; background: #fff3e0; border-radius: 4px; border-left: 3px solid #f57c00;">
                        <strong style="color: #f57c00;">🔄 Refresh Token Requested</strong><br>
                        <small style="color: #666;">The offline_access scope will request a refresh token for extended access.</small>
                    </div>
                    ` : ''}
                    <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
                    <small style="color: #666;">Building authorization request...</small>
                `;
                
                // Build authorization parameters - ALWAYS include state
                const authParams = {
                    clientId: config.clientId,
                    scope: config.scope,
                    redirectUri: config.redirectUri,
                    state: state  // ALWAYS include state parameter
                };
                
                // Add nonce for OpenID Connect flows
                if (config.scope.includes('openid')) {
                    authParams.nonce = nonce;
                    console.log('✓ Including nonce for OpenID Connect flow');
                }
                
                if (usePkce && pkce) {
                    authParams.pkceMode = 'required';
                    authParams.codeChallenge = pkce.codeChallenge;
                    authParams.codeChallengeMethod = pkce.codeChallengeMethod;
                    console.log('✓ PKCE code_challenge added to authorization parameters');
                }

                // Store client_secret for later use in token exchange
                if (!usePkce && config.clientSecret && 
                    config.clientSecret !== 'YOUR_CLIENT_SECRET' && 
                    config.clientSecret !== 'YOUR_' + serverParam.toUpperCase() + '_CLIENT_SECRET') {
                    authParams.clientSecret = config.clientSecret;
                    console.log('✓ Client secret will be included in token exchange');
                }
                
                if (iss && !launch) {
                    authParams.iss = iss;
                }
                
                if (launch) {
                    authParams.launch = launch;
                }
                
                if (config.authorizeUrl) {
                    authParams.authorizeUri = config.authorizeUrl;
                }
                
                if (config.tokenUrl) {
                    authParams.tokenUri = config.tokenUrl;
                }
                
                console.log('=== Authorization Parameters ===');
                console.log({
                    ...authParams,
                    clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided',
                    codeChallenge: authParams.codeChallenge ? `${authParams.codeChallenge.substring(0, 20)}...` : 'not provided'
                });
                
                // Store state in sessionStorage for ALL servers
                const stateKey = `oauth_state_${state}`;
                const stateData = {
                    serverKey: serverParam,
                    serverUrl: iss,
                    clientId: config.clientId,
                    clientSecret: usePkce ? null : config.clientSecret,
                    tokenUri: config.tokenUrl,
                    tokenAuthMethod: config.tokenAuthMethod || (usePkce ? 'none' : 'client_secret_post'),
                    redirectUri: config.redirectUri,
                    state: state,
                    nonce: nonce,
                    scope: config.scope,
                    usePkce: usePkce,
                    codeVerifier: pkce ? pkce.codeVerifier : null,
                    codeChallengeMethod: pkce ? pkce.codeChallengeMethod : null
                };
                
                sessionStorage.setItem(stateKey, JSON.stringify(stateData));
                console.log('✓ State saved to sessionStorage:', stateKey);
                
                // For servers with custom OAuth endpoints (like Cigna), build URL manually
                if (config.authorizeUrl && config.tokenUrl) {
                    console.log('=== Using Custom Authorization Endpoints ===');
                    
                    // Build authorize URL manually with ALL required parameters
                    const authorizeParams = new URLSearchParams({
                        response_type: 'code',
                        client_id: config.clientId,
                        redirect_uri: config.redirectUri,
                        scope: config.scope,
                        state: state,
                        nonce: nonce
                    });

                    if (usePkce && pkce) {
                        authorizeParams.append('code_challenge', pkce.codeChallenge);
                        authorizeParams.append('code_challenge_method', pkce.codeChallengeMethod);
                        console.log('✓ PKCE code_challenge added to custom authorize URL');
                    }
                    
                    // Add aud parameter (FHIR server URL)
                    if (iss) {
                        authorizeParams.append('aud', iss);
                    }
                    
                    // Add launch parameter if present
                    if (launch) {
                        authorizeParams.append('launch', launch);
                    }
                    
                    const authorizeUrl = `${config.authorizeUrl}?${authorizeParams.toString()}`;
                    
                    console.log('=== Authorize URL ===');
                    console.log(authorizeUrl);
                    console.log('=== Parsed Parameters ===');
                    for (const [key, value] of authorizeParams.entries()) {
                        if (key === 'scope') {
                            console.log(`  ${key}: ${value}`);
                            console.log(`    → Includes offline_access: ${value.includes('offline_access')}`);
                        } else {
                            console.log(`  ${key}: ${value}`);
                        }
                    }
                    
                    // Verify critical parameters
                    if (!authorizeUrl.includes('state=')) {
                        console.error('⚠️ WARNING: state parameter NOT found in authorize URL!');
                    } else {
                        console.log('✓ Confirmed: state parameter is in authorize URL');
                    }
                    
                    if (config.scope.includes('offline_access') && !authorizeUrl.includes('offline_access')) {
                        console.error('⚠️ WARNING: offline_access NOT found in authorize URL!');
                    }
                    
                    // Add info to page
                    document.getElementById('serverInfo').innerHTML += `
                        <div style="margin-top: 15px; padding: 10px; background: #e8f5e9; border-radius: 4px; border-left: 3px solid #4caf50;">
                            <strong style="color: #2e7d32;">✓ Authorization URL Built</strong><br>
                            <small style="font-size: 10px; word-break: break-all; color: #666;">${authorizeUrl}</small>
                        </div>
                    `;
                    
                    // Redirect to authorization endpoint
                    setTimeout(() => {
                        console.log('Redirecting to authorization endpoint...');
                        window.location.href = authorizeUrl;
                    }, 2000);
                    
                } else {
                    // Use standard FHIR client authorization for servers with auto-discovery
                    console.log('=== Using FHIR Client Auto-Discovery ===');
                    console.log('Authorization parameters:', {
                        ...authParams,
                        clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                    });
                    
                    // The FHIR client should handle state automatically, but let's verify
                    console.log('✓ State will be managed by FHIR client library');
                    console.log('✓ State stored in sessionStorage for validation');
                    
                    FHIR.oauth2.authorize(authParams).catch(function(error) {
                        console.error('Authorization failed:', error);
                        document.body.innerHTML = `
                            <div class="error">
                                <h2>❌ Authorization Error</h2>
                                <p><strong>Error:</strong> ${error.message}</p>
                                <pre style="font-size: 11px; overflow-x: auto;">${JSON.stringify({
                                    server: serverParam,
                                    authParams: {
                                        ...authParams,
                                        clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                                    }
                                }, null, 2)}</pre>
                                <button onclick="history.back()">Go Back</button>
                            </div>
                        `;
                    });
                }
            }
        }
    </script>
</body>
</html>
