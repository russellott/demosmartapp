<!DOCTYPE html>
<html>
<head>
    <title>SMART App Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0076ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .server-info {
            background: #f0f8ff;
            border-left: 4px solid #0076ce;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🚀 Launching SMART on FHIR App...</h1>
    <div class="spinner"></div>
    <div class="server-info" id="serverInfo"></div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        const urlParams = new URLSearchParams(window.location.search);
        const serverParam = urlParams.get('server') || ACTIVE_SERVER;
        const config = FHIR_SERVERS[serverParam];
        
        console.log('Launching with config:', {
            ...config,
            clientSecret: config?.clientSecret ? '***HIDDEN***' : 'not provided'
        });
        
        if (!config) {
            document.body.innerHTML = '<div class="error">Invalid server configuration</div>';
        } else {
            document.getElementById('serverInfo').innerHTML = `
                <strong>Server:</strong> ${config.name}<br>
                <strong>Client Secret:</strong> ${config.clientSecret ? '✓ Configured' : '⚠ Not configured'}<br>
                <small>Initiating authorization...</small>
            `;
            
            const launchIss = urlParams.get('iss');
            const iss = launchIss || config.iss;
            const launch = urlParams.get('launch');
            
            if (!launch && !iss) {
                document.body.innerHTML = '<div class="error">No ISS specified</div>';
            } else {
                const authParams = {
                    clientId: config.clientId,
                    scope: config.scope,
                    redirectUri: config.redirectUri
                };
                
                // CRITICAL: Store client_secret for later use
                if (config.clientSecret && 
                    config.clientSecret !== 'YOUR_CLIENT_SECRET' && 
                    config.clientSecret !== 'YOUR_' + serverParam.toUpperCase() + '_CLIENT_SECRET') {
                    authParams.clientSecret = config.clientSecret;
                    console.log('✓ Client secret will be included in token exchange');
                }
                
                if (iss && !launch) {
                    authParams.iss = iss;
                }
                
                if (launch) {
                    authParams.launch = launch;
                }
                
                if (config.authorizeUrl) {
                    authParams.authorizeUri = config.authorizeUrl;
                }
                
                if (config.tokenUrl) {
                    authParams.tokenUri = config.tokenUrl;
                }
                
                console.log('Authorization params:', {
                    ...authParams,
                    clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                });
                
                FHIR.oauth2.authorize(authParams).catch(function(error) {
                    console.error('Authorization failed:', error);
                    document.body.innerHTML = `<div class="error">Authorization Error: ${error.message}</div>`;
                });
            }
        }
    </script>
</body>
</html>
