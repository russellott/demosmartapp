<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!DOCTYPE html>
<html>
<head>
    <title>SMART App Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }
        .server-info {
            background: #f0f8ff;
            border-left: 4px solid #0076ce;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0076ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #c62828;
            padding: 20px;
            border-radius: 5px;
            color: #c62828;
            text-align: left;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            text-align: left;
            color: #856404;
            font-size: 13px;
        }
        .detail-line {
            margin: 5px 0;
            font-family: monospace;
            font-size: 12px;
        }
        .label {
            font-weight: bold;
            color: #0076ce;
        }
    </style>
</head>
<body>
    <h1>🚀 Launching SMART on FHIR App...</h1>
    <div class="spinner"></div>
    <div class="server-info" id="serverInfo"></div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        
        // Get server from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const serverParam = urlParams.get('server') || ACTIVE_SERVER;
        const config = FHIR_SERVERS[serverParam];
        
        console.log('=== SMART Launch Debug ===');
        console.log('Server:', serverParam);
        console.log('Config:', {
            ...config,
            clientSecret: config?.clientSecret ? '***HIDDEN***' : 'not provided'
        });
        
        if (!config) {
            document.body.innerHTML = `
                <div class="error">
                    <h2>❌ Configuration Error</h2>
                    <p><strong>Invalid server:</strong> ${serverParam}</p>
                    <p>Available servers: ${Object.keys(FHIR_SERVERS).join(', ')}</p>
                    <button onclick="history.back()">Go Back</button>
                </div>
            `;
        } else {
            // Display detailed connection info
            const secretStatus = config.clientSecret ? 
                '<span style="color: #4caf50;">✓ Confidential client (secret configured)</span>' : 
                '<span style="color: #ff9800;">⚠ Public client (no secret)</span>';
            
            const issDisplay = config.iss || 'Dynamic (from EHR launch)';
            
            document.getElementById('serverInfo').innerHTML = `
                <strong>🏥 Connecting to: ${config.name}</strong><br>
                <div class="detail-line"><span class="label">Server:</span> ${serverParam}</div>
                <div class="detail-line"><span class="label">Client Type:</span> ${secretStatus}</div>
                <div class="detail-line"><span class="label">FHIR Base:</span> ${issDisplay}</div>
                <div class="detail-line"><span class="label">Authorize:</span> ${config.authorizeUrl || 'Auto-discovered'}</div>
                <div class="detail-line"><span class="label">Token:</span> ${config.tokenUrl || 'Auto-discovered'}</div>
                <div class="detail-line"><span class="label">Redirect:</span> ${config.redirectUri}</div>
                <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
                <small style="color: #666;">Initiating OAuth 2.0 authorization flow...</small>
            `;
            
            // Get ISS from URL parameters (for EHR launches) or use configured ISS
            const launchIss = urlParams.get('iss');
            const iss = launchIss || config.iss;
            
            // Check if this is a standalone launch (no launch parameter)
            const launch = urlParams.get('launch');
            
            if (!launch && !iss) {
                document.body.innerHTML = `
                    <div class="error">
                        <h2>⚠️ Configuration Error</h2>
                        <p>No FHIR server specified (missing ISS parameter).</p>
                        <p><strong>Server:</strong> ${serverParam}</p>
                        <p><strong>Config Name:</strong> ${config.name}</p>
                        <p>For standalone launch, ISS must be configured in config.js</p>
                        <button onclick="history.back()">Go Back</button>
                    </div>
                `;
            } else {
                // Build authorization parameters
                const authParams = {
                    clientId: config.clientId,
                    scope: config.scope,
                    redirectUri: config.redirectUri
                };
                
                // Add client secret if configured (critical for Cigna)
                if (config.clientSecret && 
                    config.clientSecret !== 'YOUR_CLIENT_SECRET' && 
                    config.clientSecret !== 'YOUR_' + serverParam.toUpperCase() + '_CLIENT_SECRET') {
                    authParams.clientSecret = config.clientSecret;
                    console.log('✓ Client secret configured - will be included in token exchange');
                } else {
                    console.log('ℹ Public client mode - no client secret');
                }
                
                // Add ISS for standalone launch
                if (iss && !launch) {
                    authParams.iss = iss;
                    console.log('✓ Using configured ISS:', iss);
                }
                
                // Add launch token for EHR launch
                if (launch) {
                    authParams.launch = launch;
                    console.log('✓ EHR launch with launch token:', launch);
                }
                
                // Add custom endpoints (critical for Cigna - different domains!)
                if (config.authorizeUrl) {
                    authParams.authorizeUri = config.authorizeUrl;
                    console.log('✓ Custom authorize endpoint:', config.authorizeUrl);
                }
                if (config.tokenUrl) {
                    authParams.tokenUri = config.tokenUrl;
                    console.log('✓ Custom token endpoint:', config.tokenUrl);
                }
                
                // Log full auth params (with secret hidden)
                console.log('=== Authorization Parameters ===');
                console.log({
                    ...authParams,
                    clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                });
                
                // Show security warning for browser-based secrets
                if (config.clientSecret && config.clientSecret !== 'YOUR_CLIENT_SECRET') {
                    setTimeout(() => {
                        const warningDiv = document.createElement('div');
                        warningDiv.className = 'warning';
                        warningDiv.innerHTML = `
                            <strong>⚠️ Security Notice</strong><br>
                            This demo includes a client secret in browser code. This is visible 
                            in the page source and should <strong>only be used for testing</strong>. 
                            Production apps should use a backend proxy to protect client secrets.
                        `;
                        document.body.insertBefore(warningDiv, document.querySelector('.server-info'));
                    }, 100);
                }
                
                // Initiate SMART authorization
                console.log('=== Starting Authorization ===');
                FHIR.oauth2.authorize(authParams).catch(function(error) {
                    console.error('❌ Authorization failed:', error);
                    document.body.innerHTML = `
                        <div class="error">
                            <h2>❌ Authorization Error</h2>
                            <p><strong>Server:</strong> ${config.name}</p>
                            <p><strong>Error:</strong> ${error.message}</p>
                            <hr style="margin: 15px 0;">
                            <h3>Debug Information:</h3>
                            <pre style="font-size: 11px; overflow-x: auto;">${JSON.stringify({
                                serverKey: serverParam,
                                iss: iss,
                                hasClientSecret: !!authParams.clientSecret,
                                authParams: {
                                    ...authParams,
                                    clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                                }
                            }, null, 2)}</pre>
                            <button onclick="history.back()">Go Back</button>
                        </div>
                    `;
                });
            }
        }
    </script>
</body>
</html>
