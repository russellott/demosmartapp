<!DOCTYPE html>
<html>
<head>
    <title>SMART App Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }
        .server-info {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0076ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🚀 Launching SMART on FHIR App...</h1>
    <div class="spinner"></div>
    <div class="server-info" id="serverInfo"></div>
    
    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        const config = FHIR_SERVERS[ACTIVE_SERVER];
        
        // Display which server we're connecting to
        document.getElementById('serverInfo').innerHTML = `
            <strong>Connecting to:</strong> ${config.name}<br>
            <small>Server: ${ACTIVE_SERVER}</small>
        `;
        
        // Get ISS from URL parameters (for EHR launches) or use configured ISS
        const urlParams = new URLSearchParams(window.location.search);
        const launchIss = urlParams.get('iss');
        const iss = launchIss || config.iss;
        
        // Check if this is a standalone launch (no launch parameter)
        const launch = urlParams.get('launch');
        
        if (!launch && !iss) {
            document.body.innerHTML = `
                <h1>⚠️ Configuration Error</h1>
                <p>No FHIR server specified. Please configure the ISS parameter.</p>
                <p>Current server setting: ${ACTIVE_SERVER}</p>
            `;
        } else {
            // Build authorization parameters
            const authParams = {
                clientId: config.clientId,
                scope: config.scope,
                redirectUri: config.redirectUri
            };
            
            // Add ISS if doing standalone launch
            if (iss && !launch) {
                authParams.iss = iss;
            }
            
            // Add custom endpoints if configured
            if (config.authorizeUrl) {
                authParams.authorizeUri = config.authorizeUrl;
            }
            if (config.tokenUrl) {
                authParams.tokenUri = config.tokenUrl;
            }
            
            console.log('Authorization parameters:', authParams);
            
            // Initiate SMART authorization
            FHIR.oauth2.authorize(authParams).catch(function(error) {
                document.body.innerHTML = `
                    <h1>❌ Authorization Error</h1>
                    <div class="server-info">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Server:</strong> ${config.name}</p>
                        <p>Check your client configuration and try again.</p>
                    </div>
                `;
                console.error('Authorization error:', error);
            });
        }
    </script>
</body>
</html>
