<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!DOCTYPE html>
<html>
<head>
    <title>SMART App Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0076ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .server-info {
            background: #f0f8ff;
            border-left: 4px solid #0076ce;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            font-size: 13px;
        }
        .detail-line {
            margin: 5px 0;
            font-family: monospace;
        }
        .label {
            font-weight: bold;
            color: #0076ce;
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #c62828;
            padding: 20px;
            border-radius: 5px;
            color: #c62828;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 Launching SMART on FHIR App...</h1>
    <div class="spinner"></div>
    <div class="server-info" id="serverInfo"></div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        
        const urlParams = new URLSearchParams(window.location.search);
        const serverParam = urlParams.get('server') || ACTIVE_SERVER;
        const config = FHIR_SERVERS[serverParam];
        
        console.log('=== Launch Configuration ===');
        console.log('Server:', serverParam);
        console.log('Config:', {
            ...config,
            clientSecret: config?.clientSecret ? '***HIDDEN***' : 'not provided'
        });
        
        if (!config) {
            document.body.innerHTML = '<div class="error">Invalid server configuration</div>';
        } else {
            const launchIss = urlParams.get('iss');
            const iss = launchIss || config.iss;
            const launch = urlParams.get('launch');
            
            if (!launch && !iss) {
                document.body.innerHTML = '<div class="error">No ISS specified</div>';
            } else {
                // Generate state and nonce
                let state, nonce;
                
                if (config.useNumericStateNonce) {
                    // Generate simple numeric values for Cigna
                    state = generateNumericToken(12);
                    nonce = generateNumericToken(12);
                    console.log('✓ Generated numeric state and nonce for Cigna');
                } else {
                    // Generate standard random strings
                    state = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    nonce = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    console.log('✓ Generated standard state and nonce');
                }
                
                console.log('State:', state);
                console.log('Nonce:', nonce);
                
                // Display launch info
                document.getElementById('serverInfo').innerHTML = `
                    <strong>🏥 ${config.name}</strong><br>
                    <div class="detail-line"><span class="label">ISS:</span> ${iss || 'Dynamic'}</div>
                    <div class="detail-line"><span class="label">Client ID:</span> ${config.clientId}</div>
                    <div class="detail-line"><span class="label">Client Secret:</span> ${config.clientSecret ? '✓ Configured' : '⚠ Not configured'}</div>
                    <div class="detail-line"><span class="label">State:</span> ${state}</div>
                    <div class="detail-line"><span class="label">Nonce:</span> ${nonce}</div>
                    <div class="detail-line"><span class="label">Authorize URL:</span> ${config.authorizeUrl || 'Auto-discovered'}</div>
                    <div class="detail-line"><span class="label">Token URL:</span> ${config.tokenUrl || 'Auto-discovered'}</div>
                    <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
                    <small style="color: #666;">Building authorization request...</small>
                `;
                
                // Build authorization parameters
                const authParams = {
                    clientId: config.clientId,
                    scope: config.scope,
                    redirectUri: config.redirectUri
                };
                
                // Add state and nonce
                authParams.state = state;
                
                // For OpenID Connect, nonce should be in scope or separate parameter
                if (config.scope.includes('openid')) {
                    authParams.nonce = nonce;
                    console.log('✓ Including nonce for OpenID Connect flow');
                }
                
                // Store client_secret for later use in token exchange
                if (config.clientSecret && 
                    config.clientSecret !== 'YOUR_CLIENT_SECRET' && 
                    config.clientSecret !== 'YOUR_' + serverParam.toUpperCase() + '_CLIENT_SECRET') {
                    authParams.clientSecret = config.clientSecret;
                    console.log('✓ Client secret will be included in token exchange');
                }
                
                if (iss && !launch) {
                    authParams.iss = iss;
                }
                
                if (launch) {
                    authParams.launch = launch;
                }
                
                if (config.authorizeUrl) {
                    authParams.authorizeUri = config.authorizeUrl;
                }
                
                if (config.tokenUrl) {
                    authParams.tokenUri = config.tokenUrl;
                }
                
                console.log('=== Authorization Parameters ===');
                console.log({
                    ...authParams,
                    clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                });
                
                // For Cigna, we need to manually build the authorize URL
                // because fhir-client.js might not pass state/nonce correctly
                if (serverParam === 'cigna' || config.requiresStateNonce) {
                    console.log('=== Using Custom Authorization for Cigna ===');
                    
                    // Store state for validation after redirect
                    const stateKey = `oauth_state_${state}`;
                    sessionStorage.setItem(stateKey, JSON.stringify({
                        serverUrl: iss,
                        clientId: config.clientId,
                        clientSecret: config.clientSecret,
                        tokenUri: config.tokenUrl,
                        redirectUri: config.redirectUri,
                        state: state,
                        nonce: nonce,
                        scope: config.scope
                    }));
                    
                    // Build authorize URL manually
                    const authorizeParams = new URLSearchParams({
                        response_type: 'code',
                        client_id: config.clientId,
                        redirect_uri: config.redirectUri,
                        scope: config.scope,
                        state: state,
                        nonce: nonce
                    });
                    
                    // Add aud parameter (FHIR server URL)
                    if (iss) {
                        authorizeParams.append('aud', iss);
                    }
                    
                    const authorizeUrl = `${config.authorizeUrl}?${authorizeParams.toString()}`;
                    
                    console.log('=== Authorize URL ===');
                    console.log(authorizeUrl);
                    console.log('=== Parsed Parameters ===');
                    for (const [key, value] of authorizeParams.entries()) {
                        console.log(`  ${key}: ${value}`);
                    }
                    
                    // Add info to page
                    document.getElementById('serverInfo').innerHTML += `
                        <div style="margin-top: 15px; padding: 10px; background: #fff3cd; border-radius: 4px;">
                            <strong>🔐 Authorization URL Built</strong><br>
                            <small style="font-size: 11px; word-break: break-all;">${authorizeUrl}</small>
                        </div>
                    `;
                    
                    // Redirect to authorization endpoint
                    setTimeout(() => {
                        console.log('Redirecting to authorization endpoint...');
                        window.location.href = authorizeUrl;
                    }, 2000);
                    
                } else {
                    // Use standard FHIR client authorization for other servers
                    console.log('Using standard FHIR client authorization');
                    
                    FHIR.oauth2.authorize(authParams).catch(function(error) {
                        console.error('Authorization failed:', error);
                        document.body.innerHTML = `
                            <div class="error">
                                <h2>❌ Authorization Error</h2>
                                <p><strong>Error:</strong> ${error.message}</p>
                                <pre style="font-size: 11px; overflow-x: auto;">${JSON.stringify({
                                    server: serverParam,
                                    authParams: {
                                        ...authParams,
                                        clientSecret: authParams.clientSecret ? '***HIDDEN***' : 'not provided'
                                    }
                                }, null, 2)}</pre>
                                <button onclick="history.back()">Go Back</button>
                            </div>
                        `;
                    });
                }
            }
        }
    </script>
</body>
</html>
