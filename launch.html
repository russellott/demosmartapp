<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!DOCTYPE html>
<html>
<head>
    <title>SMART App Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }
        .server-info {
            background: #f0f8ff;
            border-left: 4px solid #0076ce;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0076ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #c62828;
            padding: 20px;
            border-radius: 5px;
            color: #c62828;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 Launching SMART on FHIR App...</h1>
    <div class="spinner"></div>
    <div class="server-info" id="serverInfo"></div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        // Get server from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const serverParam = urlParams.get('server') || ACTIVE_SERVER;
        const config = FHIR_SERVERS[serverParam];
        
        if (!config) {
            document.body.innerHTML = `
                <div class="error">
                    <h2>❌ Configuration Error</h2>
                    <p><strong>Invalid server:</strong> ${serverParam}</p>
                    <p>Available servers: ${Object.keys(FHIR_SERVERS).join(', ')}</p>
                    <button onclick="history.back()">Go Back</button>
                </div>
            `;
        } else {
            // Display which server we're connecting to
            document.getElementById('serverInfo').innerHTML = `
                <strong>Connecting to:</strong> ${config.name}<br>
                <strong>Server Key:</strong> ${serverParam}<br>
                <small>Initiating SMART authorization flow...</small>
            `;
            
            // Get ISS from URL parameters (for EHR launches) or use configured ISS
            const launchIss = urlParams.get('iss');
            const iss = launchIss || config.iss;
            
            // Check if this is a standalone launch (no launch parameter)
            const launch = urlParams.get('launch');
            
            if (!launch && !iss) {
                document.body.innerHTML = `
                    <div class="error">
                        <h2>⚠️ Configuration Error</h2>
                        <p>No FHIR server specified (missing ISS parameter).</p>
                        <p><strong>Server:</strong> ${serverParam}</p>
                        <p><strong>Config Name:</strong> ${config.name}</p>
                        <button onclick="history.back()">Go Back</button>
                    </div>
                `;
            } else {
                // Build authorization parameters
                const authParams = {
                    clientId: config.clientId,
                    scope: config.scope,
                    redirectUri: config.redirectUri
                };
                
                // Add ISS if doing standalone launch
                if (iss && !launch) {
                    authParams.iss = iss;
                }
                
                // Add custom endpoints if configured
                if (config.authorizeUrl) {
                    authParams.authorizeUri = config.authorizeUrl;
                }
                if (config.tokenUrl) {
                    authParams.tokenUri = config.tokenUrl;
                }
                
                console.log('Authorization parameters:', authParams);
                console.log('Server configuration:', config);
                
                // Initiate SMART authorization
                FHIR.oauth2.authorize(authParams).catch(function(error) {
                    document.body.innerHTML = `
                        <div class="error">
                            <h2>❌ Authorization Error</h2>
                            <p><strong>Server:</strong> ${config.name}</p>
                            <p><strong>Error:</strong> ${error.message}</p>
                            <p><strong>Details:</strong> Check browser console for more info</p>
                            <button onclick="history.back()">Go Back</button>
                        </div>
                    `;
                    console.error('Authorization error:', error);
                    console.error('Auth params used:', authParams);
                });
            }
        }
    </script>
</body>
</html>
