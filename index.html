<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!DOCTYPE html>
<html>
<head>
    <title>Patient Access API Demo</title>
    <script src="config.js"></script>
    <style>
        /* Your existing styles */
        .server-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .server-card:hover {
            border-color: #0076ce;
            box-shadow: 0 4px 12px rgba(0,118,206,0.2);
        }
        .server-card.configured {
            border-color: #4caf50;
        }
        .server-card.configured:hover {
            box-shadow: 0 4px 12px rgba(76,175,80,0.3);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-configured {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-public {
            background: #e3f2fd;
            color: #1565c0;
        }
        .status-setup {
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 Patient Access API Demo</h1>
        <p>Test CMS Patient Access APIs with SMART on FHIR</p>
    </div>

    <div class="container">
        <div class="section">
            <h2>Available FHIR Servers</h2>
            <p>Select a server to launch the SMART on FHIR authorization flow:</p>
            
            <div id="serverList"></div>
        </div>
    </div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        
        function renderServerList() {
            const container = document.getElementById('serverList');
            let html = '';
            
            Object.keys(FHIR_SERVERS).forEach(serverKey => {
                const server = FHIR_SERVERS[serverKey];
                const isConfigured = isServerConfigured(serverKey);
                
                let statusBadge = '';
                if (server.isPublic) {
                    statusBadge = '<span class="status-badge status-public">📖 Public Sandbox</span>';
                } else if (isConfigured) {
                    statusBadge = '<span class="status-badge status-configured">✓ Configured</span>';
                } else {
                    statusBadge = '<span class="status-badge status-setup">⚙️ Setup Required</span>';
                }
                
                html += `
                    <div class="server-card ${isConfigured || server.isPublic ? 'configured' : ''}" 
                         onclick="launchServer('${serverKey}')">
                        <h3>${server.name} ${statusBadge}</h3>
                        <p>${server.description}</p>
                        ${server.isPublic ? `
                            <p style="color: #1565c0; font-size: 13px;">
                                <strong>ℹ️ No registration needed</strong> - This is a public testing sandbox
                            </p>
                        ` : ''}
                        ${!isConfigured && !server.isPublic ? `
                            <p style="color: #e65100; font-size: 13px;">
                                <strong>⚠️ Configuration needed:</strong> Update config.js with your client credentials
                            </p>
                        ` : ''}
                        <button class="launch-btn" ${!isConfigured && !server.isPublic ? 'disabled' : ''}>
                            ${isConfigured || server.isPublic ? '🚀 Launch App' : '⚙️ Setup Required'}
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function launchServer(serverKey) {
            const server = FHIR_SERVERS[serverKey];
            const isConfigured = isServerConfigured(serverKey);
            
            if (!isConfigured && !server.isPublic) {
                alert(`Please configure ${server.name} in config.js first`);
                return;
            }
            
            // For SMART sandbox, you can launch directly or via their launcher
            if (serverKey === 'sandbox') {
                const choice = confirm(
                    'SMART Health IT Sandbox Launch Options:\n\n' +
                    'OK = Use SMART Launcher (recommended)\n' +
                    'Cancel = Direct launch from this app'
                );
                
                if (choice) {
                    // Use SMART launcher
                    window.open(
                        'https://launch.smarthealthit.org/?' +
                        'launch_url=' + encodeURIComponent(server.launchUri) +
                        '&launch=1',
                        '_blank'
                    );
                } else {
                    // Direct launch
                    window.location.href = `launch.html?server=${serverKey}`;
                }
            } else {
                // Direct launch for other servers
                window.location.href = `launch.html?server=${serverKey}`;
            }
        }
        
        // Render on load
        renderServerList();
    </script>
</body>
</html>
