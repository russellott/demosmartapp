<!DOCTYPE html>
<html>
<head>
    <title>Patient Access Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        .header {
            background: #0076ce;
            color: white;
            padding: 20px;
            border-radius: 5px;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .resource-item {
            padding: 10px;
            margin: 5px 0;
            background: #f5f5f5;
            border-left: 4px solid #0076ce;
        }
        .error {
            color: red;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CMS Patient Access API Demo</h1>
        <p>Demonstrating SMART on FHIR Patient Access</p>
    </div>

    <div id="content">
        <p>Loading patient data...</p>
    </div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        FHIR.oauth2.ready().then(function(client) {
            
            // Get patient demographics
            client.patient.read().then(function(patient) {
                displayPatientInfo(patient);
                
                // Get patient conditions
                return client.request(`Condition?patient=${patient.id}`);
            }).then(function(conditions) {
                displayConditions(conditions);
                
                // Get patient medications
                return client.request(`MedicationRequest?patient=${client.patient.id}`);
            }).then(function(medications) {
                displayMedications(medications);
                
            }).catch(function(error) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">Error: ' + error.message + '</div>';
            });
            
        }).catch(function(error) {
            document.getElementById('content').innerHTML = 
                '<div class="error">Authorization Error: ' + error.message + '</div>';
        });

        function displayPatientInfo(patient) {
            const name = patient.name[0];
            const fullName = `${name.given.join(' ')} ${name.family}`;
            const birthDate = patient.birthDate;
            const gender = patient.gender;
            
            const html = `
                <div class="section">
                    <h2>Patient Information</h2>
                    <p><strong>Name:</strong> ${fullName}</p>
                    <p><strong>Date of Birth:</strong> ${birthDate}</p>
                    <p><strong>Gender:</strong> ${gender}</p>
                    <p><strong>Patient ID:</strong> ${patient.id}</p>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        function displayConditions(bundle) {
            let html = '<div class="section"><h2>Medical Conditions</h2>';
            
            if (bundle.entry && bundle.entry.length > 0) {
                bundle.entry.forEach(function(entry) {
                    const condition = entry.resource;
                    const code = condition.code.text || 
                                condition.code.coding[0].display;
                    const status = condition.clinicalStatus?.coding[0]?.code || 'unknown';
                    
                    html += `
                        <div class="resource-item">
                            <strong>${code}</strong><br>
                            Status: ${status}
                        </div>
                    `;
                });
            } else {
                html += '<p>No conditions found</p>';
            }
            
            html += '</div>';
            document.getElementById('content').innerHTML += html;
        }

        function displayMedications(bundle) {
            let html = '<div class="section"><h2>Medications</h2>';
            
            if (bundle.entry && bundle.entry.length > 0) {
                bundle.entry.forEach(function(entry) {
                    const med = entry.resource;
                    const medName = med.medicationCodeableConcept?.text || 
                                   med.medicationCodeableConcept?.coding[0]?.display ||
                                   'Unknown medication';
                    const status = med.status || 'unknown';
                    
                    html += `
                        <div class="resource-item">
                            <strong>${medName}</strong><br>
                            Status: ${status}
                        </div>
                    `;
                });
            } else {
                html += '<p>No medications found</p>';
            }
            
            html += '</div>';
            document.getElementById('content').innerHTML += html;
        }
    </script>
</body>
</html>
