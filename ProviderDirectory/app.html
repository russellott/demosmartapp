<body>
    <div class="debug-toggle">
        <button class="debug-btn" onclick="toggleDebug()">
            🔍 Toggle Debug Panel
        </button>
    </div>

    <button class="back-btn" onclick="goBack()">← Back to Directory Selection</button>

    <div class="header">
        <h1>📁 Provider Directory Browser</h1>
        <p id="headerSubtitle">Loading directory information...</p>
    </div>

    <div class="search-box">
        <div class="search-controls">
            <input type="text" id="searchInput" placeholder="🔍 Enter practitioner name to search the FHIR directory..." onkeydown="handleSearchKey(event)">
            <button id="searchBtn" class="search-btn" onclick="searchPractitioners()">Search</button>
        </div>
    </div>

    <div class="debug-panel collapsed" id="debugPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0; color: #ffd54f;">🔍 API Debug Console</h2>
        </div>
        <div id="debugContent"></div>
    </div>

    <div id="stats" class="stats"></div>
    <div id="content" class="loading">
        <h2>🔎 Search for Practitioners</h2>
        <p>Enter a practitioner name above, then click Search to retrieve matching records from the selected FHIR directory.</p>
    </div>

    <!-- Practitioner Details Modal -->
    <div id="practitionerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Practitioner Details</h2>
                <button class="modal-close" onclick="closePractitionerModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="modal-loading">
                    <div class="modal-spinner"></div>
                    <p>Loading practitioner details...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.

        let debugVisible = false;
        let debugInfo = {
            timestamps: [],
            apiRequests: [],
            errors: []
        };

        let allResources = {
            practitioners: [],
            organizations: [],
            locations: [],
            healthcareServices: [],
            practitionerRoles: []
        };

        let currentDirectory = null;

        function resetResourceCache() {
            allResources = {
                practitioners: [],
                organizations: [],
                locations: [],
                healthcareServices: [],
                practitionerRoles: []
            };
        }

        function addDebugLog(category, message, data = null) {
            const timestamp = new Date().toISOString();
            debugInfo.timestamps.push({
                time: timestamp,
                category: category,
                message: message,
                data: data
            });
            updateDebugPanel();
        }

        function toggleDebug() {
            debugVisible = !debugVisible;
            document.getElementById('debugPanel').classList.toggle('collapsed');
        }

        function updateDebugPanel() {
            const content = document.getElementById('debugContent');
            let html = '';

            // API Requests Section
            if (debugInfo.apiRequests.length > 0) {
                html += '<div class="debug-section"><h3>🌐 API Requests</h3>';
                debugInfo.apiRequests.forEach((req, idx) => {
                    const status = req.ok ? '✓ OK' : `✗ ${req.status}`;
                    const statusColor = req.ok ? '#4caf50' : '#f44336';
                    html += `
                        <div class="debug-line">
                            <span class="debug-label">#${idx + 1}:</span>
                            <span class="debug-value">${req.url}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Status:</span>
                            <span class="debug-value" style="color: ${statusColor};">${status}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Duration:</span>
                            <span class="debug-value">${req.duration}ms</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Timeline
            if (debugInfo.timestamps.length > 0) {
                html += '<div class="debug-section"><h3>⏱️ Timeline</h3>';
                debugInfo.timestamps.forEach(log => {
                    html += `
                        <div class="debug-line">
                            <span class="debug-label">${new Date(log.time).toLocaleTimeString()}:</span>
                            <span class="debug-value">[${log.category}] ${log.message}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            if (debugInfo.errors.length > 0) {
                html += '<div class="debug-section error-section"><h3>❌ Errors</h3>';
                debugInfo.errors.forEach(error => {
                    html += `
                        <div class="debug-line">
                            <span class="debug-label">Error:</span>
                            <span class="debug-value" style="color: #f44336;">${error.message}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            content.innerHTML = html || '<p style="color: #999;">No debug logs yet...</p>';
        }

        function handleSearchKey(event) {
            if (event.key === 'Enter') {
                searchPractitioners();
            }
        }

        function displayAllResults() {
            const contentDiv = document.getElementById('content');
            let html = '';

            // Practitioners
            if (allResources.practitioners.length > 0) {
                html += '<div class="section"><h2>👨‍⚕️ Practitioners (' + allResources.practitioners.length + ')</h2>';
                allResources.practitioners.forEach(p => {
                    const name = p.name?.[0]?.text ||
                        ((p.name?.[0]?.given?.join(' ') || '') + ' ' + (p.name?.[0]?.family || '')).trim() ||
                        'Unknown';
                    const specialties = p.qualification?.map(q =>
                        q.code?.coding?.[0]?.display || q.code?.text || ''
                    ).filter(s => s).join(', ');
                    const escapedName = name.replace(/'/g, "\\");

                    html += `
                        <div class="resource-item clickable" onclick="showPractitionerDetails('${p.id}', '${escapedName}')"
                             title="Click to view roles and details">
                            <strong>${name}</strong><br>
                            ${specialties ? `<small>Specialties: ${specialties}</small><br>` : ''}
                            <small style="color: #999;">ID: ${p.id}</small>
                            <small style="color: #0076ce; margin-top: 8px; display: block;">📋 Click for details &amp; roles →</small>
                        </div>
                    `;
                });
                html += '</div>';
            }

            if (!html) {
                html = '<div class="no-data">📭 No matching practitioners found</div>';
            }

            contentDiv.innerHTML = html;
        }

        function displayStats() {
            const stats = {
                practitioners: allResources.practitioners.length,
                organizations: allResources.organizations.length,
                locations: allResources.locations.length,
                services: allResources.healthcareServices.length,
                roles: allResources.practitionerRoles.length
            };

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.practitioners}</div>
                    <div class="stat-label">Matches</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.organizations}</div>
                    <div class="stat-label">Cached Orgs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.locations}</div>
                    <div class="stat-label">Cached Locations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.services}</div>
                    <div class="stat-label">Cached Services</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.roles}</div>
                    <div class="stat-label">Cached Roles</div>
                </div>
            `;
        }

        async function fetchResourceBundle(resourceType, baseUrl, searchParams = {}) {
            const params = new URLSearchParams({ _count: '100' });
            Object.entries(searchParams).forEach(([key, value]) => {
                if (value !== null && value !== undefined && value !== '') {
                    params.set(key, value);
                }
            });

            const url = `${baseUrl}/${resourceType}?${params.toString()}`;

            const startTime = performance.now();
            addDebugLog('API', `Fetching ${resourceType}...`, { url });

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/fhir+json',
                    },
                    referrerPolicy: 'no-referrer'
                });

                const duration = Math.round(performance.now() - startTime);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const resources = data.entry?.map(e => e.resource).filter(r => r) || [];

                debugInfo.apiRequests.push({
                    url: url,
                    ok: true,
                    status: response.status,
                    duration: duration,
                    resourceType: resourceType,
                    count: resources.length
                });

                addDebugLog('API', `✓ Fetched ${resources.length} ${resourceType}`, { status: response.status });

                return resources;

            } catch (error) {
                const duration = Math.round(performance.now() - startTime);
                debugInfo.apiRequests.push({
                    url: url,
                    ok: false,
                    status: 'Error',
                    duration: duration,
                    error: error.message
                });

                addDebugLog('ERROR', `Failed to fetch ${resourceType}: ${error.message}`);
                debugInfo.errors.push({
                    time: new Date().toISOString(),
                    message: `${resourceType}: ${error.message}`
                });

                return [];
            }
        }

        async function fetchResourceByReference(reference) {
            if (!reference || !currentDirectory?.baseUrl) {
                return null;
            }

            const [resourceType, resourceId] = reference.split('/');
            if (!resourceType || !resourceId) {
                return null;
            }

            const cacheMap = {
                Organization: 'organizations',
                Location: 'locations',
                HealthcareService: 'healthcareServices',
                PractitionerRole: 'practitionerRoles',
                Practitioner: 'practitioners'
            };

            const cacheKey = cacheMap[resourceType];
            if (cacheKey) {
                const cached = allResources[cacheKey].find(item => item.id === resourceId);
                if (cached) {
                    return cached;
                }
            }

            const url = `${currentDirectory.baseUrl}/${resourceType}/${resourceId}`;
            const startTime = performance.now();
            addDebugLog('API', `Fetching ${resourceType}/${resourceId}...`, { url });

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/fhir+json'
                    },
                    referrerPolicy: 'no-referrer'
                });

                const duration = Math.round(performance.now() - startTime);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const resource = await response.json();
                debugInfo.apiRequests.push({
                    url,
                    ok: true,
                    status: response.status,
                    duration,
                    resourceType,
                    count: 1
                });

                if (cacheKey && !allResources[cacheKey].some(item => item.id === resource.id)) {
                    allResources[cacheKey].push(resource);
                }

                return resource;
            } catch (error) {
                const duration = Math.round(performance.now() - startTime);
                debugInfo.apiRequests.push({
                    url,
                    ok: false,
                    status: 'Error',
                    duration,
                    error: error.message
                });
                addDebugLog('ERROR', `Failed to fetch ${resourceType}/${resourceId}: ${error.message}`);
                return null;
            }
        }

        async function searchPractitioners() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchTerm = searchInput.value.trim();
            const contentDiv = document.getElementById('content');

            if (!searchTerm) {
                contentDiv.innerHTML = '<div class="no-data">⚠ Please enter a practitioner name before searching.</div>';
                searchInput.focus();
                return;
            }

            if (!currentDirectory) {
                contentDiv.innerHTML = '<div class="error"><strong>Error:</strong> No provider directory selected.</div>';
                return;
            }

            resetResourceCache();
            displayStats();
            searchBtn.disabled = true;
            searchBtn.textContent = 'Searching...';
            contentDiv.className = 'loading';
            contentDiv.innerHTML = `
                <h2>⏳ Searching Practitioners...</h2>
                <p>Searching ${currentDirectory.name} for "${searchTerm}"</p>
            `;

            addDebugLog('SEARCH', `Searching practitioners for: ${searchTerm}`, { directory: currentDirectory.name });

            try {
                const practitioners = await fetchResourceBundle('Practitioner', currentDirectory.baseUrl, { name: searchTerm });
                allResources.practitioners = practitioners;
                displayAllResults();
                displayStats();
                contentDiv.className = '';

                if (practitioners.length === 0) {
                    contentDiv.innerHTML = `<div class="no-data">📭 No practitioners found matching "${searchTerm}"</div>`;
                }

                addDebugLog('SUCCESS', `Found ${practitioners.length} practitioner match(es)`, { searchTerm });
            } catch (error) {
                addDebugLog('ERROR', `Search failed: ${error.message}`);
                contentDiv.className = '';
                contentDiv.innerHTML = `<div class="error"><strong>Search Error:</strong> ${error.message}</div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
                updateDebugPanel();
            }
        }

        function showPractitionerDetails(practitionerId, practitionerName) {
            const modal = document.getElementById('practitionerModal');
            modal.classList.add('show');
            document.getElementById('modalTitle').textContent = `👨‍⚕️ ${practitionerName}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="modal-loading">
                    <div class="modal-spinner"></div>
                    <p>Loading practitioner details...</p>
                </div>
            `;
            loadPractitionerDetails(practitionerId, practitionerName);
        }

        function closePractitionerModal() {
            const modal = document.getElementById('practitionerModal');
            modal.classList.remove('show');
        }

        async function loadPractitionerDetails(practitionerId, practitionerName) {
            const modalBody = document.getElementById('modalBody');
            
            try {
                // Find and display the practitioner from our cache
                const practitioner = allResources.practitioners.find(p => p.id === practitionerId);
                let html = '';

                if (practitioner) {
                    html += '<div class="modal-section">';
                    html += '<h3>📋 Practitioner Information</h3>';
                    
                    const name = practitioner.name?.[0]?.text ||
                        ((practitioner.name?.[0]?.given?.join(' ') || '') + ' ' + (practitioner.name?.[0]?.family || '')).trim() ||
                        'Unknown';
                    const gender = practitioner.gender || 'Not specified';
                    const npi = practitioner.identifier?.find(id => id.system === 'http://hl7.org/fhir/sid/us-npi')?.value;
                    const phone = practitioner.telecom?.find(t => t.system === 'phone')?.value;
                    const email = practitioner.telecom?.find(t => t.system === 'email')?.value;
                    const languages = practitioner.communication
                        ?.map(c => c.text || c.language?.text || c.language?.coding?.[0]?.display)
                        .filter(l => l);

                    html += `<div class="modal-item">`;
                    html += `<strong>Name:</strong> ${name}<br>`;
                    html += `<strong>Gender:</strong> ${gender}<br>`;
                    if (npi) html += `<strong>NPI:</strong> ${npi}<br>`;
                    if (phone) html += `<strong>Phone:</strong> ${phone}<br>`;
                    if (email) html += `<strong>Email:</strong> ${email}<br>`;
                    if (languages && languages.length > 0) html += `<strong>Languages Spoken:</strong> ${languages.join(', ')}<br>`;
                    html += `<strong>ID:</strong> ${practitioner.id}<br>`;
                    html += `</div>`;

                    if (practitioner.qualification && practitioner.qualification.length > 0) {
                        html += `<div class="modal-item"><strong>Qualifications:</strong><br>`;
                        practitioner.qualification.forEach(q => {
                            const code = q.code?.coding?.[0]?.display || q.code?.text || 'Unknown';
                            const issuer = q.issuer?.display || q.issuer?.reference || '';
                            html += `• ${code}${issuer ? ` (${issuer})` : ''}<br>`;
                        });
                        html += `</div>`;
                    }

                    html += '</div>';
                }

                // Find related PractitionerRoles
                let relatedRoles = allResources.practitionerRoles.filter(pr => 
                    pr.practitioner?.reference?.includes(practitionerId) ||
                    pr.practitioner?.display?.includes(practitionerName)
                );

                if (relatedRoles.length === 0 && currentDirectory?.supportedResources?.includes('PractitionerRole')) {
                    relatedRoles = await fetchResourceBundle('PractitionerRole', currentDirectory.baseUrl, {
                        practitioner: practitionerId
                    });
                    allResources.practitionerRoles = relatedRoles;
                }

                if (relatedRoles.length > 0) {
                    html += '<div class="modal-section">';
                    html += `<h3>👔 Practitioner Roles (${relatedRoles.length})</h3>`;
                    
                    for (const role of relatedRoles) {
                        html += '<div class="modal-item">';
                        
                        const roleCode = role.code?.map(c => c.coding?.[0]?.display || c.text || '').filter(r => r).join(', ');
                        if (roleCode) html += `<strong>Role:</strong> ${roleCode}<br>`;

                        const specialty = role.specialty?.map(s =>
                            s.coding?.[0]?.display || s.text || ''
                        ).filter(s => s).join(', ');
                        if (specialty) html += `<strong>Specialty:</strong> ${specialty}<br>`;

                        let organizationHtml = '';
                        if (role.organization?.reference) {
                            const organization = await fetchResourceByReference(role.organization.reference);
                            if (organization) {
                                const orgType = organization.type?.map(t =>
                                    t.coding?.[0]?.display || t.text || ''
                                ).filter(Boolean).join(', ');
                                const orgPhone = organization.telecom?.find(t => t.system === 'phone')?.value;

                                organizationHtml = `
                                    <div class="related-resource-card organization">
                                        <div class="related-resource-title">🏢 ${organization.name || 'Unnamed Organization'}</div>
                                        <div class="related-resource-meta">
                                            ${orgType ? `<div><strong>Type:</strong> ${orgType}</div>` : ''}
                                            ${orgPhone ? `<div><strong>Phone:</strong> ${orgPhone}</div>` : ''}
                                        </div>
                                        <div class="related-resource-id">FHIR ID: ${organization.id}</div>
                                    </div>
                                `;
                            }
                        }

                        let locationCards = [];
                        if (role.location && role.location.length > 0) {
                            for (const loc of role.location) {
                                const location = await fetchResourceByReference(loc.reference);
                                if (location) {
                                    const address = location.address?.text || [
                                        ...(location.address?.line || []),
                                        location.address?.city,
                                        location.address?.state,
                                        location.address?.postalCode
                                    ].filter(Boolean).join(', ');
                                    const telecom = location.telecom?.find(t => t.system === 'phone')?.value;
                                    const physicalType = location.physicalType?.coding?.[0]?.display || location.physicalType?.text || '';

                                    locationCards.push(`
                                        <div class="related-resource-card location">
                                            <div class="related-resource-title">📍 ${location.name || 'Unnamed Location'}</div>
                                            <div class="related-resource-meta">
                                                ${physicalType ? `<div><strong>Type:</strong> ${physicalType}</div>` : ''}
                                                ${address ? `<div><strong>Address:</strong> ${address}</div>` : ''}
                                                ${telecom ? `<div><strong>Phone:</strong> ${telecom}</div>` : ''}
                                            </div>
                                            <div class="related-resource-id">FHIR ID: ${location.id}</div>
                                        </div>
                                    `);
                                }
                            }
                        }

                        if (organizationHtml) {
                            html += `<span class="role-section-label">Related Organization</span>`;
                            html += `<div class="related-resource-grid">${organizationHtml}</div>`;
                        }

                        if (locationCards.length > 0) {
                            html += `<span class="role-section-label">Related Location${locationCards.length > 1 ? 's' : ''}</span>`;
                            html += `<div class="related-resource-grid">${locationCards.join('')}</div>`;
                        }

                        // Get related Healthcare Services
                        let serviceCards = [];
                        if (role.healthcareService && role.healthcareService.length > 0) {
                            for (const hs of role.healthcareService) {
                                const service = await fetchResourceByReference(hs.reference);
                                if (service) {
                                    const specialty = service.specialty?.map(s =>
                                        s.coding?.[0]?.display || s.text || ''
                                    ).filter(Boolean).join(', ');
                                    const telecom = service.telecom?.find(t => t.system === 'phone')?.value;

                                    serviceCards.push(`
                                        <div class="related-resource-card service">
                                            <div class="related-resource-title">🏥 ${service.name || 'Unnamed Service'}</div>
                                            <div class="related-resource-meta">
                                                ${specialty ? `<div><strong>Specialty:</strong> ${specialty}</div>` : ''}
                                                ${telecom ? `<div><strong>Phone:</strong> ${telecom}</div>` : ''}
                                            </div>
                                            <div class="related-resource-id">FHIR ID: ${service.id}</div>
                                        </div>
                                    `);
                                }
                            }
                        }

                        if (serviceCards.length > 0) {
                            html += `<span class="role-section-label">Related Healthcare Service${serviceCards.length > 1 ? 's' : ''}</span>`;
                            html += `<div class="related-resource-grid">${serviceCards.join('')}</div>`;
                        }

                        html += `<strong style="display: block; margin-top: 8px; color: #999; font-size: 12px;">Role ID: ${role.id}</strong>`;
                        html += '</div>';
                    }
                    html += '</div>';
                } else {
                    html += '<div class="modal-section"><h3>👔 Practitioner Roles</h3><p style="color: #999;">No roles found for this practitioner</p></div>';
                }

                modalBody.innerHTML = html;
                addDebugLog('DETAIL', `Loaded details for practitioner: ${practitionerName}`, { id: practitionerId, rolesFound: relatedRoles.length });

            } catch (error) {
                addDebugLog('ERROR', `Failed to load practitioner details: ${error.message}`);
                modalBody.innerHTML = `<div class="modal-section"><p style="color: red;">Error loading details: ${error.message}</p></div>`;
            }
        }

        // Close modal when clicking outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('practitionerModal');
            if (event.target === modal) {
                closePractitionerModal();
            }
        }

        async function loadProviderDirectory() {
            addDebugLog('INIT', 'Initializing provider directory browser...');

            const urlParams = new URLSearchParams(window.location.search);
            const directoryKey = urlParams.get('directory') || ACTIVE_DIRECTORY;
            const directory = PROVIDER_DIRECTORIES[directoryKey];
            currentDirectory = directory;

            if (!directory) {
                document.getElementById('content').innerHTML =
                    '<div class="error"><strong>Error:</strong> Invalid directory selected. <a href="index.html">Go back and select a directory.</a></div>';
                return;
            }

            document.getElementById('headerSubtitle').textContent = `Browsing: ${directory.name} (search by practitioner name to retrieve results)`;
            addDebugLog('DIR', `Selected directory: ${directory.name}`, { baseUrl: directory.baseUrl });

            resetResourceCache();
            displayStats();
            updateDebugPanel();
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Initialize and load
        loadProviderDirectory();
    </script>
</body>

</html>
