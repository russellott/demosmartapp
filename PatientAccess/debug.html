<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!DOCTYPE html>
<html>
<head>
    <title>SMART on FHIR - Debug Console Only</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #4caf50;
            padding: 20px;
            margin: 0;
        }
        .console {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: #263238;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #4caf50;
        }
        h1 {
            margin: 0;
            color: #ffd54f;
        }
        .section {
            background: #263238;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
        }
        .section h2 {
            color: #ffd54f;
            margin-top: 0;
        }
        .log-entry {
            padding: 8px;
            margin: 5px 0;
            background: #1e272e;
            border-radius: 4px;
            font-size: 13px;
        }
        .timestamp {
            color: #90a4ae;
        }
        .label {
            color: #81c784;
            font-weight: bold;
        }
        .value {
            color: #fff;
        }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            color: #4caf50;
        }
        .error {
            color: #f44336;
        }
        .warning {
            color: #ffc107;
        }
        .success {
            color: #4caf50;
        }
        button {
            background: #0076ce;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #005a9e;
        }
    </style>
</head>
<body>
    <div class="console">
        <div class="header">
            <h1>🔍 SMART on FHIR Debug Console</h1>
            <p>Detailed OAuth 2.0 Token Request Debugging</p>
            <button onclick="downloadDebugLog()">💾 Download Full Log</button>
            <button onclick="clearConsole()">🗑️ Clear Console</button>
            <button onclick="location.reload()">🔄 Refresh</button>
        </div>
        
        <div id="console-output"></div>
    </div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.
        
        const logs = [];
        
        function log(level, category, message, data = null) {
            const entry = {
                timestamp: new Date().toISOString(),
                level: level,
                category: category,
                message: message,
                data: data
            };
            logs.push(entry);
            displayLog(entry);
        }
        
        function displayLog(entry) {
            const output = document.getElementById('console-output');
            const time = new Date(entry.timestamp).toLocaleTimeString();
            
            let levelClass = '';
            let levelIcon = '';
            switch(entry.level) {
                case 'ERROR': levelClass = 'error'; levelIcon = '❌'; break;
                case 'WARN': levelClass = 'warning'; levelIcon = '⚠️'; break;
                case 'SUCCESS': levelClass = 'success'; levelIcon = '✓'; break;
                default: levelClass = ''; levelIcon = 'ℹ️';
            }
            
            let html = `
                <div class="log-entry ${levelClass}">
                    <span class="timestamp">[${time}]</span>
                    <span>${levelIcon}</span>
                    <span class="label">[${entry.category}]</span>
                    <span class="value">${entry.message}</span>
                `;
            
            if (entry.data) {
                html += `<pre>${JSON.stringify(entry.data, null, 2)}</pre>`;
            }
            
            html += `</div>`;
            
            output.innerHTML += html;
            output.scrollTop = output.scrollHeight;
        }
        
        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
            logs.length = 0;
        }
        
        function downloadDebugLog() {
            const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `smart-fhir-debug-${Date.now()}.json`;
            a.click();
        }
        
        // Intercept all fetch requests
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            const url = args[0];
            const options = args[1] || {};
            
            log('INFO', 'FETCH', `Request to: ${url}`);
            
            if (url.includes('token') || url.includes('oauth')) {
                log('SUCCESS', 'TOKEN', '🎯 TOKEN REQUEST INTERCEPTED', {
                    url: url,
                    method: options.method || 'POST',
                    headers: options.headers,
                    body: options.body
                });
                
                // Parse body if it's form data
                if (options.body && typeof options.body === 'string') {
                    const params = new URLSearchParams(options.body);
                    const bodyObj = {};
                    for (const [key, value] of params) {
                        bodyObj[key] = value;
                    }
                    log('INFO', 'TOKEN', 'Request body (parsed):', bodyObj);
                }
            }
            
            return originalFetch.apply(this, args).then(response => {
                log('INFO', 'RESPONSE', `Response from: ${url} - Status: ${response.status}`);
                
                if (url.includes('token') || url.includes('oauth')) {
                    return response.clone().text().then(text => {
                        try {
                            const data = JSON.parse(text);
                            log('SUCCESS', 'TOKEN', '🎯 TOKEN RESPONSE RECEIVED', data);
                        } catch (e) {
                            log('WARN', 'TOKEN', 'Could not parse token response as JSON:', text);
                        }
                        return response;
                    });
                }
                
                return response;
            }).catch(error => {
                log('ERROR', 'FETCH', `Request failed: ${error.message}`, {
                    url: url,
                    error: error.toString()
                });
                throw error;
            });
        };
        
        log('INFO', 'INIT', 'Debug console initialized');
        log('INFO', 'INIT', 'Starting SMART on FHIR flow...');
        
        FHIR.oauth2.ready().then(function(client) {
            log('SUCCESS', 'AUTH', '✓ Authorization successful!');
            log('INFO', 'STATE', 'Client state:', {
                serverUrl: client.state.serverUrl,
                clientId: client.state.clientId,
                redirectUri: client.state.redirectUri,
                tokenUri: client.state.tokenUri,
                patientId: client.patient.id
            });
            
            // Try a simple request
            client.patient.read().then(patient => {
                log('SUCCESS', 'FHIR', 'Patient data retrieved', {
                    id: patient.id,
                    name: patient.name,
                    birthDate: patient.birthDate
                });
            });
            
        }).catch(function(error) {
            log('ERROR', 'AUTH', 'Authorization failed', {
                message: error.message,
                stack: error.stack
            });
        });
    </script>
</body>
</html>
