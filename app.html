    <style>
        body {

<body>
    <div class="debug-toggle">
        <button class="debug-btn" onclick="toggleDebug()">
            🔍 Toggle Debug Panel
        </button>
    </div>

    <div class="header">
        <h1>🏥 CMS Patient Access API Demo</h1>
        <p>Real-World SMART on FHIR Implementation with Full Debugging</p>
    </div>

    <div class="debug-panel" id="debugPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0; color: #ffd54f;">🔍 OAuth & Network Debug Console</h2>
            <div>
                <button class="copy-btn" onclick="exportNetworkLog()">📊 Export Network Log</button>
                <button class="copy-btn" onclick="copyAllDebugInfo()">📋 Copy All Debug Info</button>
            </div>
        </div>
        <div id="debugContent"></div>
    </div>

    <div id="stats" class="stats"></div>
    <div id="content" class="loading">
        <h2>🔄 Loading patient data...</h2>
        <p>Connecting to FHIR server and retrieving records...</p>
    </div>

    <script>
        // Code Generated by Sidekick is for learning and experimentation purposes only.

        // Initialize network debugger FIRST
        NetworkDebugger.init();

        let debugInfo = {
            timestamps: [],
            authState: {},
            tokenRequest: {},
            tokenResponse: {},
            fhirRequests: [],
            errors: []
        };

        let debugVisible = true;

        function addDebugLog(category, message, data = null) {
            const timestamp = new Date().toISOString();
            debugInfo.timestamps.push({
                time: timestamp,
                category: category,
                message: message,
                data: data
            });
            updateDebugPanel();
        }

        function toggleDebug() {
            debugVisible = !debugVisible;
            document.getElementById('debugPanel').classList.toggle('collapsed');
        }

        function copyAllDebugInfo() {
            const fullDebug = {
                ...debugInfo,
                networkRequests: NetworkDebugger.export()
            };
            navigator.clipboard.writeText(JSON.stringify(fullDebug, null, 2));
            alert('Complete debug info copied to clipboard!');
        }

        function exportNetworkLog() {
            const networkLog = NetworkDebugger.export();
            navigator.clipboard.writeText(JSON.stringify(networkLog, null, 2));
            alert('Network log copied to clipboard!');
        }

        function updateDebugPanel() {
            const content = document.getElementById('debugContent');
            let html = '';

            // Network Requests Section
            const networkRequests = NetworkDebugger.getRequests();
            if (networkRequests.length > 0) {
                html += generateNetworkSection(networkRequests);
            }

            if (Object.keys(debugInfo.authState).length > 0) {
                const state = debugInfo.authState;
                html += `
                    <div class="debug-section">
                        <h3>🔐 Authorization State</h3>
                        <div class="debug-line">
                            <span class="debug-label">State:</span>
                            <span class="debug-value">${state.state || 'N/A'}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Nonce:</span>
                            <span class="debug-value">${state.nonce || 'N/A'}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Server URL:</span>
                            <span class="debug-value">${state.serverUrl || 'N/A'}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Token URI:</span>
                            <span class="debug-value">${state.tokenUri || 'N/A'}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Client ID:</span>
                            <span class="debug-value">${state.clientId || 'N/A'}</span>
                        </div>
                        <div class="debug-line">
                            <span class="debug-label">Client Secret:</span>
                            <span class="debug-value">${state.hasSecret ? '<span class="success-badge">✓ Configured</span>' : '<span class="warning-badge">⚠ Not Provided</span>'}</span>
                        </div>
                    </div>
                `;
            }

            if (Object.keys(debugInfo.tokenRequest).length > 0) {
                const req = debugInfo.tokenRequest;
                html += `
                    <div class="debug-section">
                        <h3>📤 Token Request</h3>
                        <div class="debug-line">
                            <span class="debug-label">URL:</span>
                            <span class="debug-value">${req.url || 'N/A'}</span>
                        </div>
                        <div class="debug-json">${req.bodyFormatted || 'N/A'}</div>
                    </div>
                `;
            }

            if (Object.keys(debugInfo.tokenResponse).length > 0) {
                const res = debugInfo.tokenResponse;
                html += `
                    <div class="debug-section">
                        <h3>📥 Token Response</h3>
                        <div class="debug-line">
                            <span class="debug-label">Status:</span>
                            <span class="debug-value">${res.status || 'N/A'} ${res.ok ? '<span class="success-badge">✓ Success</span>' : '<span class="warning-badge">⚠ Error</span>'}</span>
                        </div>
                        ${res.accessToken ? `
                        <div class="debug-line">
                            <span class="debug-label">Access Token:</span>
                            <span class="debug-value">${res.accessToken.substring(0, 30)}...</span>
                        </div>
                        ` : ''}
                        ${res.refreshToken ? `
                        <div class="debug-line">
                            <span class="debug-label">Refresh Token:</span>
                            <span class="debug-value" style="color: #ffc107;">${res.refreshToken.substring(0, 30)}... <span class="success-badge">✓ Received</span></span>
                        </div>
                        ` : ''}
                        ${res.rawResponse ? `<div class="debug-json">${JSON.stringify(res.rawResponse, null, 2)}</div>` : ''}
                    </div>
                `;
            }

            html += '<div class="debug-section"><h3>⏱️ Timeline</h3>';
            debugInfo.timestamps.forEach(log => {
                html += `
                    <div class="debug-line">
                        <span style="color: #90a4ae; font-size: 11px;">${new Date(log.time).toLocaleTimeString()}</span>
                        <span class="debug-label">[${log.category}]</span>
                        <span class="debug-value">${log.message}</span>
                    </div>
                `;
            });
            html += '</div>';

            if (debugInfo.errors.length > 0) {
                html += '<div class="debug-section error-section"><h3>❌ Errors</h3>';
                debugInfo.errors.forEach(error => {
                    html += `
                        <div class="debug-line">
                            <span style="color: #90a4ae; font-size: 11px;">${new Date(error.time).toLocaleTimeString()}</span>
                            <span class="debug-value" style="color: #f44336;">${error.message}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            content.innerHTML = html;
        }

        // Code Generated by Sidekick is for learning and experimentation purposes only.

        function generateNetworkSection(requests) {
            let html = '<div class="debug-section"><h3>🌐 Network Requests</h3>';

            const failedRequests = requests.filter(r => r.error || (r.status && !r.ok));
            if (failedRequests.length > 0) {
                html += `<div style="color: #f44336; margin-bottom: 10px;"><strong>⚠️ ${failedRequests.length} failed request(s)</strong></div>`;
            }

            requests.forEach((req, idx) => {
                const isFailed = req.error || (req.status && !req.ok);
                const statusBadge = req.error ?
                    '<span class="error-badge">ERROR</span>' :
                    req.ok ?
                        `<span class="success-badge">${req.status}</span>` :
                        `<span class="error-badge">${req.status}</span>`;

                html += `
            <div class="network-request ${isFailed ? 'failed' : ''}">
                <div class="debug-line">
                    <span class="debug-label">#${idx + 1} ${req.method}:</span>
                    <span class="debug-value">${req.url}</span>
                </div>
                ${req.originalUrlParam ? `
                <div class="debug-line">
                    <span class="debug-label">Original URL Param:</span>
                    <span class="debug-value" style="font-family: monospace; font-size: 11px; color: #90a4ae;">${req.originalUrlParam}</span>
                </div>
                ` : ''}
                ${req.resourcePath ? `
                <div class="debug-line">
                    <span class="debug-label">Resource Path:</span>
                    <span class="debug-value">${req.resourcePath}</span>
                </div>
                ` : ''}
                ${req.baseUrl ? `
                <div class="debug-line">
                    <span class="debug-label">Base URL Used:</span>
                    <span class="debug-value" style="${req.baseUrl === 'https://fhir.cigna.com/PatientAccess/v1-devportal' ? 'color: #4caf50;' : 'color: #f44336;'}">${req.baseUrl}</span>
                </div>
                ` : ''}
                <div class="debug-line">
                    <span class="debug-label">Status:</span>
                    <span class="debug-value">${statusBadge} ${req.statusText || ''}</span>
                </div>
                <div class="debug-line">
                    <span class="debug-label">Duration:</span>
                    <span class="debug-value">${req.duration}ms</span>
                </div>
                ${req.headers ? `
                <div class="debug-line">
                    <span class="debug-label">Request Headers:</span>
                </div>
                <div class="debug-json">${JSON.stringify(req.headers, null, 2)}</div>
                ` : ''}
                ${req.responseHeaders ? `
                <div class="debug-line">
                    <span class="debug-label">Response Headers:</span>
                </div>
                <div class="debug-json">${JSON.stringify(req.responseHeaders, null, 2)}</div>
                ` : ''}
                ${req.error ? `
                <div class="debug-line">
                    <span class="debug-label" style="color: #f44336;">Error:</span>
                    <span class="debug-value" style="color: #f44336;">${req.error.message}</span>
                </div>
                ${req.error.stack ? `
                <div class="debug-json" style="color: #f44336;">${req.error.stack}</div>
                ` : ''}
                ` : ''}
                ${req.responseBody ? `
                <div class="debug-line">
                    <span class="debug-label">Response Body:</span>
                </div>
                <div class="debug-json">${typeof req.responseBody === 'string' ?
                            req.responseBody.substring(0, 500) :
                            JSON.stringify(req.responseBody, null, 2).substring(0, 500)}...</div>
                ` : ''}
            </div>
        `;
            });

            html += '</div>';
            return html;
        }


        addDebugLog('INIT', 'Starting OAuth callback handler');
        addDebugLog('NETWORK', 'Network debugger initialized and ready');

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        console.log('=== OAuth Callback ===');
        console.log('Code:', code ? code.substring(0, 20) + '...' : 'NOT FOUND');
        console.log('State:', state);

        if (code && state) {
            addDebugLog('AUTH', 'Authorization code and state received');
            addDebugLog('AUTH', `State from URL: ${state}`);

            // SMART servers may replace the state parameter, so we'll find any oauth_state_* key
            let stateKey = null;
            let storedStateStr = null;

            // First try exact match
            const exactKey = `oauth_state_${state}`;
            storedStateStr = sessionStorage.getItem(exactKey);

            if (storedStateStr) {
                stateKey = exactKey;
                addDebugLog('AUTH', `✓ Found exact state match: ${stateKey}`);
            } else {
                // If no exact match, find ANY oauth_state_* key (for single-user demo)
                addDebugLog('WARN', `No exact match for state ${state}, searching for any oauth_state_* key...`);

                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    if (key.startsWith('oauth_state_')) {
                        stateKey = key;
                        storedStateStr = sessionStorage.getItem(key);
                        addDebugLog('AUTH', `✓ Found stored state: ${key}`);

                        // Parse and log the stored state value
                        try {
                            const parsed = JSON.parse(storedStateStr);
                            addDebugLog('WARN', `⚠️ State mismatch! URL state: ${state}, Stored state: ${parsed.state}`);
                        } catch (e) {
                            // Continue anyway
                        }
                        break;
                    }
                }
            }
            if (!storedStateStr) {
                addDebugLog('ERROR', `State validation failed - no stored state found for stateKey = ${stateKey}`);
                debugInfo.errors.push({
                    time: new Date().toISOString(),
                    message: 'State validation failed'
                });
                updateDebugPanel();
                document.getElementById('content').innerHTML =
                    '<div class="error"><strong>Error:</strong> Session state not found. Please try launching again.</div>';
            } else {
                const clientState = JSON.parse(storedStateStr);
                addDebugLog('STATE', '✓ State validated successfully');

                debugInfo.authState = {
                    state: state,
                    nonce: clientState.nonce,
                    clientId: clientState.clientId,
                    hasSecret: !!clientState.clientSecret,
                    serverUrl: clientState.serverUrl,
                    tokenUri: clientState.tokenUri
                };
                updateDebugPanel();

                const tokenParams = {
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: clientState.redirectUri,
                    client_id: clientState.clientId
                };

                if (clientState.clientSecret) {
                    tokenParams.client_secret = clientState.clientSecret;
                    addDebugLog('TOKEN', '✓ Including client_secret in token exchange');
                }

                const displayParams = {
                    grant_type: tokenParams.grant_type,
                    code: tokenParams.code,
                    redirect_uri: tokenParams.redirect_uri,
                    client_id: tokenParams.client_id,
                    client_secret: tokenParams.client_secret ? '***PROVIDED***' : 'NOT PROVIDED'
                };

                debugInfo.tokenRequest = {
                    url: clientState.tokenUri,
                    bodyFormatted: JSON.stringify(displayParams, null, 2)
                };
                updateDebugPanel();

                addDebugLog('TOKEN', 'Exchanging authorization code for access token...');

                TokenHandler.exchangeToken(clientState.tokenUri, tokenParams)
                    .then(tokenData => {
                        addDebugLog('TOKEN', '✓ Token exchange successful');

                        debugInfo.tokenResponse = {
                            status: 200,
                            ok: true,
                            accessToken: tokenData.access_token,
                            refreshToken: tokenData.refresh_token,
                            expiresIn: tokenData.expires_in,
                            rawResponse: tokenData
                        };
                        updateDebugPanel();

                        loadFhirClient(clientState, tokenData);
                    })
                    .catch(error => {
                        addDebugLog('ERROR', `Token exchange failed: ${error.message}`);
                        debugInfo.errors.push({
                            time: new Date().toISOString(),
                            message: error.message
                        });
                        updateDebugPanel();

                        document.getElementById('content').innerHTML =
                            `<div class="error"><strong>Token Exchange Error:</strong> ${error.message}<br><br>Check the debug panel for details.</div>`;
                    });
            }
        } else {
            addDebugLog('WARN', 'No authorization code found - redirecting to launch');
            window.location.href = 'index.html';
        }

        function loadFhirClient(clientState, tokenData) {
            addDebugLog('FHIR', 'Loading FHIR client library...');

            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/fhirclient@2.5.2/build/fhir-client.min.js';
            script.onload = function () {
                addDebugLog('FHIR', 'FHIR client library loaded');

                // Build complete client state with all OAuth information
                const fullClientState = {
                    serverUrl: clientState.serverUrl,  // CRITICAL: This must be the FHIR base URL
                    clientId: clientState.clientId,
                    scope: clientState.scope,
                    redirectUri: clientState.redirectUri,
                    tokenUri: clientState.tokenUri,
                    tokenResponse: {
                        access_token: tokenData.access_token,
                        token_type: tokenData.token_type || 'Bearer',
                        expires_in: tokenData.expires_in,
                        scope: tokenData.scope || clientState.scope,
                        patient: tokenData.patient,
                        id_token: tokenData.id_token,
                        refresh_token: tokenData.refresh_token
                    }
                };

                // If client secret exists, include it for potential refresh
                if (clientState.clientSecret) {
                    fullClientState.clientSecret = clientState.clientSecret;
                    addDebugLog('FHIR', '✓ Client secret included for token refresh capability');
                }

                console.log('=== Creating FHIR Client ===');
                console.log('Full client state:', {
                    ...fullClientState,
                    clientSecret: fullClientState.clientSecret ? '***HIDDEN***' : 'not provided',
                    tokenResponse: {
                        ...fullClientState.tokenResponse,
                        access_token: fullClientState.tokenResponse.access_token ?
                            fullClientState.tokenResponse.access_token.substring(0, 20) + '...' : 'N/A',
                        refresh_token: fullClientState.tokenResponse.refresh_token ?
                            fullClientState.tokenResponse.refresh_token.substring(0, 20) + '...' : 'N/A'
                    }
                });

                // CRITICAL: Log the serverUrl that will be used for FHIR requests
                console.log('🎯 FHIR Base URL:', fullClientState.serverUrl);
                addDebugLog('FHIR', `FHIR Base URL: ${fullClientState.serverUrl}`);

                try {
                    // Create FHIR client with complete state
                    const client = FHIR.client(fullClientState);

                    addDebugLog('FHIR', '✓ FHIR client initialized successfully');

                    // Verify client has all necessary properties
                    console.log('=== Client State Verification ===');
                    console.log('Client state.serverUrl:', client.state.serverUrl);
                    console.log('Client state.tokenUri:', client.state.tokenUri);
                    console.log('Client state.tokenResponse:', !!client.state.tokenResponse);
                    console.log('Client patient.id:', client.patient?.id);

                    // CRITICAL: Verify the base URL the client will use
                    const clientBaseUrl = client.state.serverUrl;
                    console.log('✓ Client will use base URL:', clientBaseUrl);

                    if (clientBaseUrl !== fullClientState.serverUrl) {
                        console.error('⚠️ WARNING: Client base URL does not match configured URL!');
                        console.error('  Expected:', fullClientState.serverUrl);
                        console.error('  Got:', clientBaseUrl);
                    }

                    // Add detailed logging to debug info
                    addDebugLog('FHIR', `Client initialized with base URL: ${clientBaseUrl}`);

                    // Load patient data
                    loadPatientData(client, clientBaseUrl);

                } catch (error) {
                    addDebugLog('ERROR', `Failed to create FHIR client: ${error.message}`);
                    debugInfo.errors.push({
                        time: new Date().toISOString(),
                        message: `FHIR client creation error: ${error.message}`
                    });
                    updateDebugPanel();

                    document.getElementById('content').innerHTML =
                        `<div class="error"><strong>FHIR Client Error:</strong> ${error.message}</div>`;
                }
            };

            script.onerror = function () {
                addDebugLog('ERROR', 'Failed to load FHIR client library');
                document.getElementById('content').innerHTML =
                    '<div class="error">Failed to load FHIR client library</div>';
            };

            document.head.appendChild(script);
        }

        // Code Generated by Sidekick is for learning and experimentation purposes only.

        async function loadPatientData(client, expectedBaseUrl) {
            addDebugLog('FHIR', 'Starting to fetch patient data with raw fetch...');

            console.log('=== FHIR Request Configuration ===');
            console.log('Expected Base URL:', expectedBaseUrl);
            console.log('Client Base URL:', client.state.serverUrl);
            console.log('Access Token Present:', !!client.state.tokenResponse?.access_token);

            const stats = {
                conditions: 0,
                medications: 0,
                immunizations: 0,
                claims: 0
            };

            const baseUrl = client.state.serverUrl;
            const accessToken = client.state.tokenResponse.access_token;
            const patientId = client.state.tokenResponse.patient;

            console.log('Patient ID from token:', patientId);

            // Helper function for FHIR requests
            async function fhirFetch(resourcePath) {
                const fullUrl = `${baseUrl}/${resourcePath}`;

                console.log(`\n=== 🔍 FHIR Request ===`);
                console.log('Resource Path:', resourcePath);
                console.log('Full URL:', fullUrl);
                console.log('Base URL:', baseUrl);

                addDebugLog('FHIR', `Requesting: ${fullUrl}`);

                debugInfo.fhirRequests.push({
                    method: 'GET',
                    url: fullUrl,
                    resourcePath: resourcePath,
                    baseUrl: baseUrl,
                    originalUrlParam: resourcePath,
                    time: new Date().toISOString()
                });
                updateDebugPanel();

                const response = await fetch(fullUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                        // No Accept header - avoid CORS preflight
                    },
                    referrerPolicy: 'no-referrer'
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ Request failed:', response.status, response.statusText);
                    console.error('Error body:', errorText);
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                addDebugLog('FHIR', `✓ Request successful: ${fullUrl}`);
                console.log('✓ Response received:', data);

                return data;
            }

            try {
                // Fetch Patient
                console.log('\n=== Starting Patient Data Fetch ===');
                const patient = await fhirFetch(`Patient/${patientId}`);
                console.log('✓ Patient retrieved:', patient);
                addDebugLog('FHIR', `✓ Patient data retrieved: ${patient.id}`);
                displayPatientInfo(patient);

                // Fetch Conditions
                console.log(`\n=== Fetching Conditions for Patient ${patientId} ===`);
                const conditionsBundle = await fhirFetch(`Condition?patient=${patientId}`);
                const conditions = conditionsBundle.entry ? conditionsBundle.entry.map(e => e.resource) : [];
                console.log('✓ Conditions retrieved:', conditions);
                addDebugLog('FHIR', `✓ Found ${conditions.length} conditions`);
                stats.conditions = conditions.length;
                displayConditions(conditions);

                // Fetch Medications
                console.log(`\n=== Fetching Medications ===`);
                const medicationsBundle = await fhirFetch(`MedicationRequest?patient=${patientId}`);
                const medications = medicationsBundle.entry ? medicationsBundle.entry.map(e => e.resource) : [];
                console.log('✓ Medications retrieved:', medications);
                addDebugLog('FHIR', `✓ Found ${medications.length} medications`);
                stats.medications = medications.length;
                displayMedications(medications);

                // Fetch Immunizations
                console.log(`\n=== Fetching Immunizations ===`);
                const immunizationsBundle = await fhirFetch(`Immunization?patient=${patientId}`);
                const immunizations = immunizationsBundle.entry ? immunizationsBundle.entry.map(e => e.resource) : [];
                console.log('✓ Immunizations retrieved:', immunizations);
                addDebugLog('FHIR', `✓ Found ${immunizations.length} immunizations`);
                stats.immunizations = immunizations.length;
                displayImmunizations(immunizations);

                displayStats(stats);
                addDebugLog('SUCCESS', '✓ All patient data loaded successfully');

            } catch (error) {
                console.error('\n=== ❌ FHIR Request Error ===');
                console.error('Error:', error);
                console.error('Error Message:', error.message);
                console.error('Error Type:', error.name);
                console.error('Client Base URL:', client.state.serverUrl);
                console.error('Expected Base URL:', expectedBaseUrl);

                if (error.message.includes('Network request failed') ||
                    error.message.includes('Failed to fetch')) {
                    console.error('\n🔍 Network Error Details:');
                    console.error('This is likely a CORS error, authentication issue, or network connectivity problem');
                    console.error('Check the browser Network tab for the actual HTTP status code');
                }

                addDebugLog('ERROR', `FHIR request error: ${error.message}`);
                debugInfo.errors.push({
                    time: new Date().toISOString(),
                    message: `FHIR request error: ${error.message}`,
                    errorType: error.name,
                    clientBaseUrl: client.state.serverUrl,
                    expectedBaseUrl: expectedBaseUrl
                });
                updateDebugPanel();

                document.getElementById('content').innerHTML += `
            <div class="error">
                <h3>❌ Error Loading FHIR Data</h3>
                <p><strong>Error:</strong> ${error.message}</p>
                <p><strong>Error Type:</strong> ${error.name}</p>
                <p><strong>Expected Base URL:</strong> ${expectedBaseUrl}</p>
                <p><strong>Client Base URL:</strong> ${client.state.serverUrl}</p>
                <hr>
                <p><strong>💡 Troubleshooting:</strong></p>
                <ul style="text-align: left; margin-left: 20px;">
                    <li>Check the browser's Network tab for the actual HTTP response</li>
                    <li>Look for CORS errors in the console</li>
                    <li>Verify the access token is valid and not expired</li>
                    <li>Confirm the FHIR base URL is correct</li>
                </ul>
                <p><strong>Check the "Network Requests" section in the debug panel for full details.</strong></p>
            </div>`;
                console.error('Full error object:', error);
            }
        }


        function displayStats(stats) {
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.conditions}</div>
                    <div class="stat-label">Conditions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.medications}</div>
                    <div class="stat-label">Medications</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.immunizations}</div>
                    <div class="stat-label">Immunizations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.claims}</div>
                    <div class="stat-label">Claims (EOB)</div>
                </div>
            `;
        }

        function displayPatientInfo(patient) {
            const name = patient.name?.[0];
            const fullName = name ?
                `${(name.given || []).join(' ')} ${name.family || ''}` :
                'Name not available';
            const birthDate = patient.birthDate || 'Not available';
            const gender = patient.gender || 'Not specified';

            document.getElementById('content').innerHTML = `
                <div class="section">
                    <h2>👤 Patient Information</h2>
                    <p><strong>Name:</strong> ${fullName}</p>
                    <p><strong>Date of Birth:</strong> ${birthDate}</p>
                    <p><strong>Gender:</strong> ${gender}</p>
                    <p><strong>Patient ID:</strong> ${patient.id}</p>
                </div>
            `;
        }

        function displayConditions(conditions) {
            let html = '<div class="section"><h2>🩺 Medical Conditions</h2>';

            if (conditions && conditions.length > 0) {
                conditions.forEach(condition => {
                    const code = condition.code?.text ||
                        condition.code?.coding?.[0]?.display ||
                        'Unspecified condition';
                    const status = condition.clinicalStatus?.coding?.[0]?.code || 'unknown';

                    html += `
                        <div class="resource-item">
                            <strong>${code}</strong><br>
                            <small>Status: ${status}</small>
                        </div>
                    `;
                });
            } else {
                html += '<p>No conditions found.</p>';
            }

            html += '</div>';
            document.getElementById('content').innerHTML += html;
        }

        function displayMedications(medications) {
            let html = '<div class="section"><h2>💊 Medications</h2>';

            if (medications && medications.length > 0) {
                medications.forEach(med => {
                    const medName = med.medicationCodeableConcept?.text ||
                        med.medicationCodeableConcept?.coding?.[0]?.display ||
                        'Unknown medication';

                    html += `
                        <div class="resource-item">
                            <strong>${medName}</strong>
                        </div>
                    `;
                });
            } else {
                html += '<p>No medications found.</p>';
            }

            html += '</div>';
            document.getElementById('content').innerHTML += html;
        }

        function displayImmunizations(immunizations) {
            let html = '<div class="section"><h2>💉 Immunizations</h2>';

            if (immunizations && immunizations.length > 0) {
                immunizations.forEach(imm => {
                    const vaccine = imm.vaccineCode?.text ||
                        imm.vaccineCode?.coding?.[0]?.display ||
                        'Unknown vaccine';
                    const date = imm.occurrenceDateTime || imm.date || 'Date not recorded';

                    html += `
                        <div class="resource-item">
                            <strong>${vaccine}</strong><br>
                            <small>Date: ${date}</small>
                        </div>
                    `;
                });
            } else {
                html += '<p>No immunizations found.</p>';
            }

            html += '</div>';
            document.getElementById('content').innerHTML += html;
        }

        updateDebugPanel();
    </script>
</body>

</html>
